body:
  text: 辨定祭禮通俗譜卷四翰林院檢討毛竒齡撰辨明焚香灼油燎儀見前主人下祭用長子上祭中祭用貴者若兄弟同貴則仍序長次如子姪有貴者則長子攝祭而以貴者序攝者後等主婦弟子姪并婦各易盛服貴者易朝服婦命服餘各本等新服詣家堂贊序立主人主婦居中弟以次東弟婦以次西為一列子姪以次由中至東婦以次由中至西為一列有母列西上一位有庶母列西稍上一位女弟與婦列女與子姪列若有次嫡並貴不主祭者則與婦厠主人主婦後為第二列而降子姪為第三列如子贊姪貴者則但與婦厠主者後仍第二列拜同揖主人等各分立或分坐主祭者出一行坐樂作用大小同銅吹大鼓闋止贊也啓祏下祭祗啓左右祏後同樂再作闋贊出主出主匰門牌亦然主不去冒樂三作闋贊安主去主冒入座主人奉安考主婦奉安妣主遍祭義夏后氏祭暗用昏時殷祭陽以日中惟周祭從朝至暗窮一日之力少牢所謂旦明行事子路祭于季氏質明行事晏朝而退是也禮凡祭之日必先作樂以降神然後灌鬯郊特牲殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告于天地之間也則未灌以前大樂三闋此是恆禮不止殷人也禮作樂以降神尸入即作樂以降神周禮大司樂凡樂九變以降神皆在灌鬯之先故周禮鄭注云先奏六樂以致其神而後灌焉則三代之制必先奏樂且必三闋六樂九變無單奏者贊行灌禮右儐取香草末和酒于贊盞授主人主人受之跪衆皆贊跪灌主人以盞贊三灌于地興主人等各退後三步復進立贊迎神樂贊作拜衆皆拜興拜興跪樂贊止祝告祝讀祝贊文畢伏樂作興拜興拜興平身樂止灌為祭禮之最先者自安主之後即當灌以降神然後迎牲行朝踐禮故灌必在室王入太室灌是也此時主未出堂灌必在地灌地以降神是也朱禮用茅沙盆大謬説見前但此是天子諸侯之禮故儀禮大夫士有奠而無灌即諸侯有灌而或無鬯王制所謂未賜圭瓉則資鬯于天子況大夫士乎但降神迎神是祭時要禮而王度記有云天子以鬱諸侯以薰大夫以蘭士以蕭庶人以艾則自天子至庶人皆得有灌鬯之禮特天子用鬱則魏略云大秦有蘇合薰陸鬱金藝膠十二種古未通中國祗貢天子故惟天子得用之若蘭薰諸草即今香草也諸侯大夫皆可通用則但用香草之末而和之清酒之中蓋鬯本酒名先釀秬黍以為酒其氣條暢因以名鬯然後築鬱以和之築鬱者搗鬱也其所搗之器亦俱香木故又曰暢臼以柏杵以梧謂柏與梧皆香器也則搗薰蕭以和酒最是易事賈侍中不識築字謂十葉為貫百二十貫為築則憑臆可笑若盧植謂鬱金秬黍共釀而為酒則周禮鬱人鬯人明分二事不可通矣若其器則天子用圭瓚諸侯用玉璋皆貴重之物故今亦以玉為之至如祭脂達臭用蕭合黍稷膟膋焫之使臭達牆屋此真天子之禮在大夫士並不一有且其儀在薦熟後或云在薦腥時不可考今俱不用祝嘏見前祝告祝以文告神俗所謂讀祝也古祝告在薦獻前儀禮少牢禮于實鼎舉爼後將迎尸設祭即行祝告可驗今在初獻後或三獻後然後讀祝誤矣況讀祝二字亦不通祝者職事之名古以祝官且以祝氏如衛祝鮀類祝文者祝其人告其文也讀祝則讀其人矣又古無紙故書祝文板竹間今既用紙又復糊板亦非是郊特牲直祭祝主索祭祝祊此與詔羮詔牲等同並非祝告天下有一祭屢告者乎祝文式維某年干支某月干支朔越某日干支孝孫某概以孫字不稱曽玄等謹以柔毛剛鬛粢盛庶羞祗修時祭于先始祖考某官某府君先祖妣某封某贈某氏先某祖考不祧主某官某府君先某祖妣某封某贈某氏下祭無此先髙祖考某官某府君先髙祖妣某封某贈某氏曽祖至考同以某親某官祔食祔主尚饗郊特牲謂祭稱孝孫孝子以其義稱也稱曽孫某謂國家也諸侯有國大夫有家據此則諸侯卿大夫士凡祭自曽祖以上皆稱曽孫如詩曽孫燕喜書有道曽孫類但下祭三代若止稱曽孫則反與下祭無别且孫可以該諸孫猶祖可以該諸祖如始祖廟稱祖廟則祭祖廟以下自可統稱孝孫此亦上下並通者若不别稱孝子者則孫可該子也贊行薦腥禮主人出迎牲內于庭宰牲分兩肩兩胉兩脅為六體羊豕同治腥槃每槃腥羊豕各一體每副槃以切羊豕肺肝實之主人引槃入祝以幣從卷紙贊為幣奠幣祝奠幣贊各案前薦腥主人奉槃主婦奉副奠于各案贊初獻主者詣案前贊跪衆皆跪獻主人奉清盞主婦奉醴盞儐受奠之起樂作中止出下祭于此時啓祏主安位訖贊迎主出堂用響樂贊導出安主各安贊位訖參神樂贊作拜衆皆拜興拜興平身樂止贊行薦熟禮庖進熟槃每槃熟羊豕肉各一方每副槃以炙羊豕肉實之主人引槃入贊薦熟儀如前贊再獻主人奉清爵主婦奉醴爵餘儀如前此即朝踐禮也又名朝事禮器君親割牲夫人薦盎鄭注謂朝事時也但朝事從灌後即行薦腥禮孔疏所謂祼鬯既訖君出廟門迎牲納于庭乃殺牲薦之周禮注九獻有四節其一節曰祼其二節曰薦腥是也祗割牲為腥各有裁制士喪禮分七體特牲分九體少牢分十一體其中有肩胉髀脅脊臂臑肫脡骼諸名總是以前後左右分貴賤之等周禮內饔掌割烹有辨體謂解羊豕之體而辨其前後左右橫直之不同今其制已不可考則但分六體而以前為貴以後為賤而次第獻之似亦不失禮意矣槃副見前薦腥為行獻之始故主人告神大夫贊佐以幣從此亦朝踐時一大節目況終祭無獻幣者故用之但禮注以幣告庭中此從禮器納牲詔于庭語而臆會之者夫納牲之告安用幣乎禮君親制祭謂進腥之時斷割牲肝以祭神于室又祭時有加胏離胏嚌胏諸儀則副以胏肝甚為得當若副炙則毛詩或燔或炙周禮注熟物有炙有濡儀禮從燔羞燔皆是炙肉然皆以賓獻即副爼也天子九獻則在灌時已二獻矣至朝踐薦腥則主人三獻主婦四獻不無太數今中祭五獻則斷以朝踐為一獻之始而後薦熟二獻正祭三獻遷饌四獻酳神五獻而上祭則于酳神後再加獻焉下祭祗薦熟正祭酳神三獻上祭加籩豆一獻合酳一獻為七獻此獻之數也古獻祗一爵不知考妣分合何等今合主人主婦為並獻而以二爵進考妣較為近禮況古用酒不一周禮五齊皆可取獻禮運有玄酒醴盞粢醴澄酒之别大抵由濁而清分列堂室而獻則多用濁酒如大祫注朝踐用泛齊醴齊皆是滓酒可驗也今不備五齊不列堂室但分清濁二種而以主人主婦合進之則二爵並獻不亦宜乎古薦腥之後行薦熟禮周禮注九獻之節其三曰薦熟是也禮運鄭注腥其爼謂豚解而腥之熟其殽謂體解而爓之故薦熟在薦腥之後正祭之前但其祭必在堂禮器鄭注謂薦熟必在堂則迎主出堂然後薦熟此定禮也若于比又獻則正九獻所謂薦熟時體解其牲而烹之王以玉爵獻盎齊即此是也初獻用盞再獻用爵者以列盞在室列爵在堂也尊壺互用或尊貯醴酒壺貯清酒一勺挹一吭寫亦通或銀勺或磁勺俱可用贊行祭禮內饔奉簠簋簠一盛黍稷簋一盛稻菽以授主人清鍾清鍾三茶湯贊飯以授主婦進粢飲主人奉簠簋主婦贊奉清鍾奠于各案侑奏清樂以絃和歌闋庖奉鼎盂五雁羊豕魚翰爼槃五授即五鼎之膚可切聶者以主人上祭加二爼鉶碗五也即五鼎之贊羮以授主婦進鼎爼主人奉鼎爼奠于各案進鉶主婦奉鉶奠于贊各案侑奏管樂以笙管笛和歌闋贊三獻儀如前贊迎主入室用響樂贊導入安主各安贊位訖遷饌移堂上饋食奠各案前贊侑奏合樂合絃管笙笛以和歌闋贊四獻儀如前贊受酢主人主婦贊詣香案前跪衆皆跪人儐取神前酒贊爵授主清鍾授主婦神賜飲食主人啐酒主婦贊啐茶授執事起謝神樂贊作拜衆皆拜興拜興平身樂止徹𧃊此正祭禮也又名直祭又謂之設祭在薦熟出堂後即當行之但古無成説在禮注薦熟後復有饋食設祭合烹薦腥爓諸名參錯難辨遂有謂薦熟即饋食者有謂饋食即合烹者有謂饋食合烹即薦腥爓者有謂饋食薦熟薦腥爓總屬正祭者説各不同但薦熟之後其為名雖多而總屬一祭合烹饋食薦腥爓設祭相去不逺惟薦熟則斷非饋食合烹諸節所得混稱薦熟在鑊合烹饋食在鼎器不同也薦熟在堂饋食則半在堂而半在室地不同也薦熟近朝踐而饋食合烹則將薦腥爓而散為宗族兄弟退食之餕候不同也是薦熟合烹有截然其難通者故周禮大宗伯注始則灌鬯以求神既灌則獻牲以薦腥既獻則解牲體以薦熟既薦則薦黍稷以饋食截然四節今不名饋食亦不名合烹并薦腥爓而但以祭名該之此正祭也禮所謂正祭在堂直祭祝于主正指此也周禮有六榖六清諸物六榖稻黍之屬以簠簋盛之謂之粢盛六清漿酏之屬以鍾盞盛之亦謂之清飲今以茶代水以湯代漿以飯代糜取其便俗若鼎爼之制則但用五牲入鼎而即以五牲外膚可聶切而食者名之為爼五牲之湆可和菜而為羮者實之為鉶其鼎盂爼槃鉶碗説見前物孟子前以三鼎而後以五鼎注三鼎士祭禮五鼎大夫祭禮今牲用少牢則鼎亦但用五鼎而止但舊禮注三鼎特豕魚臘五鼎羊豕魚臘膚九鼎牛羊豕魚臘腸胃膚鮮魚鮮臘則似雜出少倫理何也以膚宜入爼臘宜入豆腸胃不知出何牲二鮮不當復魚臘也今五鼎之數羊一豕二雁三翰四鱗五羊豕者毛牲也雁翰者羽牲也魚者鱗牲也古云士庶之祭魚雁而已雁者鵝也曲禮雞曰翰音禮注六牲馬牛羊豕犬雞上祭無加鼎而有加爼古正爼之外原有肵爼肵者敬也言敬而加之非正爼也但鼎爼數奇舊五爼之外設陪爼三然後加肵一仍是奇數今無陪爼而祗加一肵則偶矣加二者合奇數也古云鳥獸之肉不登于爼則君不射是爼原得備鳥獸二肉今加一鳥爼加一獸爼以雉兔獐鷃之肉登之頗為不謬其加籩加豆見後爼鉶之制原所以輔鼎者故有陪鼎之稱大抵七鼎中之肉以升于爼則爼即鼎也鉶則即取鼎中物而和以羮如牛鼎則鉶羮之芼用藿而臭用膷羊鼎則鉶羮之芼用苦而臭用臐豕鼎則鉶羮之芼用薇而臭用膮類則仍用鼎肉而和以諸菜名曰羞鼎亦名曰羮鼎其于古何異焉列鼎爼式以五鼎近筵南為一列五爼居中為一列五鉶近筵北為一列鼎以盂蓋作趺其髙出鉶爼上祭祀堂上用清歌堂下用管樂此是恆禮如虞書堂上琴瑟以詠堂下管鼗笙鏞明堂位升歌清廟下管象舞祭統聲莫重于升歌武莫重于武宿夜尚書大傳古者升歌清廟堂上大琴達越堂下鐘鼓笙瑟皆是至于合樂則如儀禮工歌笙入合樂工歌者清歌也笙入即笙管樂也合樂者合琴瑟笙管上下之樂而總為之也今以清樂代清歌以管樂代下管以絃管笙笛並作代合樂此亦去古不逺者周禮尸出入奏肆夏王出入奏王夏凡一舉一動皆有樂今主出入但以響樂導之亦奏夏之意禮設祭在堂設饌在室故禮器主薦熟設祭皆在堂而少牢饋食在奧室則更延尸而入于奧是以九獻儀于朝踐後退而合烹至薦熟之時是設饌在堂也乃復延尸入室徙堂上之饌于室內而王乃獻尸是正祭合烹半在堂而半在室此禮之一定而可據者況獻尸後原有神酢主人之儀而合烹既畢又有與宗族兄弟歡燕之典則借此饋食一當神酢一當合餕而羣厭之為日中之餐此亦禮意之曲至者也𧃊即餕謂食祭之餘饌也曲禮餕餘不祭儀禮有上餕下餕皆作𧃊古朝事初獻之後即行酢禮主人獻尸尸酢主人此即二端二禮互相酬報之義但嫌其太數故于饋食時及終祭行之若儀禮受酢之儀又有尸摶飯授主人主人實于左袖而挂袖于季指然後寫袖中之飯而出之槃間此禮之最猥璅無狀者朱氏禮于他重禮皆不解而此則偏有之且此行于初獻之後並非飲福受胙之儀而注為受胙誤矣先仲氏曰受胙者受酢之訛也良然贊迎主出堂用響樂贊導出安主各安位訖贊行酳禮內饔奉籩八四果羞四餈羞以授主人豆八四脯臘四菹贊醢以授主婦進籩豆主人奉籩主婦奉豆贊奠于各案籩左豆右侑奏合樂闋贊五獻主人奉清斚主婦奉醴斚餘儀如前弟上祭加二籩二豆實以方物薦畢加一獻諸子姪并婦合作一獻凡七獻贊飲福受胙主人主婦贊詣香案前跪衆皆跪脯儐取神斚贊授主人豆授主婦神賜飲食主人啐酒主婦贊嚌脯授執事起謝神樂贊作拜衆皆拜興拜興跪樂贊止嘏告嘏南面贊立告畢伏樂作興拜興拜興平身樂止徹𧃊贊送神焚紙幣大罏贊用響樂導入內主合牌與宔送入匰室閉祏揖出特牲少牢皆有酳神之禮酳者食後以酒蕩口而演養之也故饋食之後必用酳禮所以演養主神者九獻自饋食後薦加籩豆而酌醴祭酳正謂此也但古有王酳后酳及諸卿大夫酳不無太數今祗以主人主婦合酳之且一如古禮以籩豆之薦酌酒以酳豈非斟酌盡善乎物籩豆所實物古有成數大抵饋食之籩用棗栗桃乾䕩乾梅榛實諸物加籩之實用菱芡栗脯諸物羞籩之實用糗餌粉餈諸物雖品數不同要不外稿核鮮蒂乾蒸餌四種今定以八籩而分作兩羞以稿核如榛實栗脯荔肉棐胎之類鮮蒂如櫻䕩蓮芡蓏奈梨棗之類總名果羞以乾如餅饀炊炙之類蒸餌如麷粉糕糗之類總名餈羞此籩之實也若朝事之豆有脾折豚拍即牲物也有鹿臡麋臡麕臡鹿醢則野牲物也有魚醢蜃醢螺醢蚳醢則蟲物也有菖菹菁菹葵菹韭菹則植物也郊特牲注所謂籩豆偶者有植物是也加豆有雁醢兔醢筍菹菭菹亦即野牲植物之類要其概亦總不外脯腵修臘醢鮓菹醬四種今定以八豆而分作脯臘菹醢如羊豕之拍折雞鴨之䐢雉兔獐鹿之醢膾魚蛤之鮓醬筍脯蓏芹絲菭髮菌餅薯腓種種皆可取用禮云不敢用褻味而貴多品此豆之實也若加籩加豆則竒物異珍有即用之趙岐注獵較謂異珍難得得則雖較而不禁正謂是耳周禮九獻之節天子上公俱九獻侯伯七獻子男五獻大夫士三獻天子大祫十有二獻今下祭以三獻為度中祭以五獻為度若上祭豈無並侯伯而跨子男者則擬加二獻非越分也況酳神之禮原有酳及賓從者則自為六獻而以諸弟子姪一獻當合酳之禮豈為過乎周禮凡加籩豆謂尸食訖酳神所加之籩豆則正在行酳禮之際古飲酢之禮以尸酢主人主人飲之謂之飲酢以其為受福故又謂之飲福若受膰歸脤諸禮則分受祭肉又在飲福之後腥曰脤熟曰膰皆祭肉也今祭畢分牲俗名散胙亦遺意也儀禮少牢嘏告主人有皇尸命工祝承致諸語似汚邪之祝徼福太多似不如用詩句八字所謂崇此簡易耳嘏告式皇祖命工祝承致錫爾純嘏子孫其湛若貴者在官則諸兄弟攝祭有告文告文式孝孫某官某使孝孫若是庶孫稱介孫某執其常事敢告朱氏家禮于三獻之後有主人以下皆出闔門祝噫歆然後啓門一節初甚疑之後較儀禮文知此是喪禮有萬萬不可行者儀禮既夕與虞祭皆有聲三啓户之文謂啓殯之際與葬畢歸祭魂無所依故祝先闔户使男女踊哭户外至升堂止哭然後聲三啓户鄭注聲者噫歆也謂將啓户警覺鬼神也則此是喪祭之禮與祭禮並無干涉而以此為吉祭是吉凶並行禮制大壞矣又曽子問君薨而世子生則于祝告時亦止哭作聲三而大戴禮諸侯遷廟亦聲三以警神聽然後入告此亦凶喪之禮初薨遷國魂無所依與啓殯葬歸倀倀正同今堂堂盛祭有廟有祏可憑可依而忽作此不祥之禮何鹵莽至此且噫歆二字出自鄭注禮文無有此必齊俗鄉語如春秋登來論語文莫之類今欲行此禮而噫歆之聲作何咳吐盍亦就訂禮者一明問之朱禮于受胙後又有告利成一節按儀禮告利成者利訓養成訓備謂祭畢而養已備可以起矣此是諷尸使起而難以明言因託為告主人以諷之故告利成後即云尸謖尸謖者尸起也今祭不扮尸將欲誰告朱禮于祭禮大小節目茫然不諳而獨于祝噫歆告利成兩事似以為竒節而並取之然俱是差錯或有為朱辨者云告尸與告主一也今雖無尸然主自在也主在則利成何不可告而曰不然曽子問有云隂厭無尸則不告利成鄭注謂利成之告禮之施于尸者無尸不告禮文彰彰也世不識禮亦不識禮記耶古有祊祭一在祭日所謂道求而未得者一在次日所謂索祭者俱在門房祭日在門內之房次日在門外之房今以過于璅賾皆不用宗堂長孫有貴者即于宗堂啓三􅡕而行此禮若止下祭則家堂宗堂俱但啓左右祏出主于室俟行薦腥禮後然後啓中􅡕出主安主行薦熟禮祭禮酳禮三獻不迎主出入餘儀同辨定祭禮通俗譜卷四
