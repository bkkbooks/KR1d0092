body:
  text: 辨定祭禮通俗譜卷五翰林院檢討毛竒齡撰四時薦新儀薦日主人等詣家堂常服盥啓祏闢匰門焚香灼油燎主人奠新或槃或鼎清鍾一茶籩四餈果羞二羞二主婦奠副新鼎則副槃新槃則副鼎清鍾一飯豆四菹脯臘二醢二告某年月日孝孫某等祗薦時羞敢告降拜二迎神獻一如祭獻儀拜二送神焚幣閉祏出薦新說見前但所薦有三一五榖麥菽黍稻是也一蔬果櫻韭棗芰是也一鮮腥魚鮪羔雁是也然薦必有副如薦蔬榖以鮮腥副之薦鮮腥以蔬榖副之一薦祗一副如薦韭祗用卵薦麥祗用魚薦黍祗用豚薦稻祗用雁類稻黍以槃魚豕以鼎隨薦器所用而副器因之三薦之外復有薦好羞一禮周禮庖人共祭祀之好羞謂生時所好者如文王嗜菖歜曽晳嗜羊棗屈到嗜芰類生好之則死羞之此是恆禮而屈建以非儀却之不孝甚矣但常祭之時好物或不能適登且祖先具在不便加器則于登物時薦之此亦薦新中之一大節也周禮加籩豆原有菱芰不知屈建何以言非薦品也薦不用簠簋以薦黍薦稻薦稷各有正薦則五榖不必另設也但薦雖各時而概用稻飯則以稻為恆食非簠簋所儲物耳士薦用特豚大夫以上用羔特豚者豕之一體周禮注小豕也羔亦羊之小者但楚語又云籩豆脯醢則上下共之不羞珍異不陳庶侈故略用籩豆以見意若儀禮有薦新如朔奠用特豚魚臘三鼎則喪中之薦與此不同漢惠帝時叔孫通曰古者春嘗果方今櫻桃熟可獻宗廟諸薦之獻自此始然含桃之薦已見月令或漢初失此禮故言之豈始自漢乎薦祗在寢今之家堂是也然禮每言薦于寢廟必兼廟言者以為此廟中之寢非薦在廟也祭出主薦不出主主尚不出況出廟乎嵗薦儀夏至日薦日詣家堂掃除主人等常服盥啓祏開匰門焚香灼油燎告某年月日孝孫某等祗修嵗薦敢告降拜二迎神主人奠簠一稷黍簋一菽稻鼐一獸牲鼎一魚禽爼一折拍主婦奠清鍾三飯茶湯鉶鼎一湆牲陪鉶二湆禽魚一獻儀見前主人奠籩四餈果羞羞主婦奠豆四菹膴臘醢再獻拜二送神焚幣徹閉祏出此家堂之薦貴賤並行者儀義俱見前宗堂長孫儀並同魏髙堂隆曰士特豚大夫以上將之以羔或加以犬而已不必三牲也庶人則惟其時宜魚雁而已故一鼎一鼐略為大小以合竒數其所實或羊豕野牲或雞魚皆可用鉶本陪鼎以一加二亦奇數也特豚者豕之一體與特豕不同嵗祭儀冬至日內嵗薦在齊戒前三日迫日掃除室堂室即藏祏之室堂前堂也嵗薦祗在室中設位室堂俱中設二案一近西為始祖位一近東稍南為世室位兩傍各五案為祧祖位啓左祏設一短屏蔽長房髙祖匰室仍閉如故香案室堂每案設罏一燭臺二室東下案尊壺各一盞二十五傍設澡槃帨有架前堂同堂東下案尊壺各一爵二十四斚二十四畫鍾不計數西下案樂器大同拍小同大銅吹小簫絃板鼓鼓笛管笙階下大罏有棜禁擇儐二人祝嘏二人族中子弟能者為之庖饔四人樂員四人主人推尊貴者為之貴同則仍以親序若貴相懸者不得僭越省牲豕一羊一殺牲刳滌藏堂下側室瘞毛血嵗薦無省牲以下三事授庖人薦槃十二用嵗薦不鼎盂六十爼槃六十鉶碗六十授饔人簠簋二十二清鍾三十六籩九十六豆九十六辨明焚香灼油燎主人等通族每房若干人不婦俱各易盛服貴者易朝服餘各本等新服序立主人居中長房長孫次主人後次貴者又次長孫後其餘以世次左右贊分列揖儀見前樂作用大小同銅吹大鼓闋贊啓祏樂再作闋贊出主樂三作闋贊安主贊行灌禮嵗薦無此右儐取香草末和贊酒玉盞授主者跪衆皆贊跪灌三灌贊于地興主人等各退後三步復進立贊迎神樂贊作拜衆皆拜興拜興跪樂贊止祝告祝讀祝贊文畢伏樂作興拜興拜興平身樂止贊行薦腥禮嵗薦無此主人出迎牲內于庭宰牲分兩肩獻中􅡕餘以左右分十體治腥槃每槃腥羊豕各一體主人引槃入祝以幣從卷紙為贊十二幣奠幣祝奠幣贊各案前薦腥奠腥槃贊初獻主者詣案前贊跪衆皆跪獻主者奉盞儐者奠各案祧室每室各二起樂止贊迎主出堂用響樂贊導出安主各安贊位訖參神樂贊作拜衆皆拜興拜興平身樂止贊行薦熟禮嵗薦無此庖進熟槃每槃熟羊豕各一體主人引槃入贊薦熟儀如前贊再獻主者奉爵餘如前贊行祭禮此後嵗薦俱同祗少二獻并主不出入耳饔奉簠簋黍稷稻菽各一清鍾茶湯飯贊各三進粢飲奠各贊案侑奏清樂如前闋庖奉鼎盂羊豕魚雁翰各五爼槃脾臄拍折各五鉶碗雜羮贊各五進鼎爼進鉶奠各贊案侑奏管樂闋贊三獻此長房長孫主之以嵗薦始此耳贊迎主入室用響樂導入安主遷饌移堂上饋食贊奠各案前侑奏合樂闋贊四獻此次貴主之贊受酢贊跪皆跪爵儐取神贊前酒授主者神賜飲食主者啐酒授執事贊起謝神樂贊止拜皆拜興拜興平身樂止徹燕周禮司尊凡時祭必朝踐兩尊再獻又兩尊則一祭原有設四尊者今宗堂之燕慮酒不足則較時祭加二尊禮固有如是也祝文以祗修時祭時字易嵗字長孫嵗薦祇自告如前嵗薦儀祭時燕兄弟古無明文惟特牲少牢諸禮于賓長獻尸後有主人獻賓及衆賓與堂下獻長兄弟衆兄弟之文皆在尸未卒食之前則燕禮原有舉之𧃊食先者故楚茨詩皇尸載起神保聿歸諸父兄弟備言燕私正言皇尸入室燕禮遂作所謂燕不在堂而在寢者此時正相合也若陽厭尸謖改饌作燕則又祭畢之燕中庸燕毛在旅酬後此稍不同然正可並舉耳餘說見前燕以長房長孫主爵謂收族固宗房事也此時貴者當易服以昭穆為次第後燕亦然贊迎主出堂用響樂贊導出安主贊行酳禮饔奉籩果羞四餈羞四豆脯臘四贊菹醢四進籩豆奠各贊案侑奏合樂闋贊五獻此昭穆最尊者一人主之主者奉斚餘儀同進加籩加豆奠各案此嵗薦無贊六獻此又次貴者主之無則仍用主初二獻者嵗薦無此贊七獻此通族推各房尊者各主之嵗薦無此贊飲福受胙主者詣贊案前跪皆跪授儐取贊神斚主者神賜飲食主者啐酒贊訖起謝神樂贊作拜皆拜興拜興跪樂贊止嘏告告贊畢伏樂作興拜興拜興平身樂止徹燕贊送神焚幣內主閉祏揖出嘏告式見時祭儀若貴者在官兄弟攝祭其攝儀攝告文式與時祭同忌奠儀忌日主人等詣家堂素服盥焚香灼油燎出主考忌與妣俱妣忌與考俱跪告今某日為申哀諱辰孝子某等敬奠敢告起拜二設簠簋二清鍾三主人奠鼎一牲陪鼎一牲野爼一胾雜主婦奠鉶一羮雜豆八菹膴臘四醢四好羞槃謂生平所嗜物獻用醴酒不計數拜四徹無時焚幣閉祏出齊服有𤣥端素端二色皆可用奠有多鼎如遣奠用五鼎大斂奠用三鼎類若餘奠不過一鼎今斷以一鼎一陪則亦酌諸奠而得其中者若周禮好羞原以生平所好食物言此與祭義思其所嗜意同說見前至豆籩並薦今祗列八豆者按朔奠無籩有豆雜記遣奠有載粻者而有子譏為失禮則餦餭粉糗奠所不用若其餘諸奠則無不以脯醢醴酒為常用之物故獻爵純用醴酒八豆純用脯醢而籩羞不用此正以忌日寓喪奠之意所謂無其禮而有其義者世不乏知禮宜共鑒之墓祭儀清明日霜降日前一日掃塋葺封視疆域歸省牲羊一豕一殺牲刳滌隨或牷獻或體獻俗行事擇儐二人鼓吹四人設神亭虛位治牲槃長槃二黍稷槃連槅清鍾槃木缶有蓋鼎爼槃用一槃中分三行五槅前行五槅代牲鼎次行五槅代熟爼三行五槅代羮鉶籩豆槃用一槃中分四行四格前行四格果籩二行四格餈籩三行四格醢豆四行四格菹豆盞爵斚尊壺香罏燭臺紙幣諸需用物向晨備舟車或舟或車主人男婦等蓋仗鼓吹迎神亭并牲禮往設席鋪氍毺易盛服如時祭儀進牲槃以下五槃訖贊序立如前揖皆揖跪皆贊跪祝告祝讀贊文畢伏樂作興拜興拜興平身樂止贊行初獻禮主者長貴嫡三者見前詣案前贊跪皆跪獻主人奉考盞主婦奉妣盞儐受奠起皆起贊行再獻禮主者初獻用貴嫡則此以長者主再獻詣案前贊跪皆跪獻主人奉考爵主婦奉妣爵起皆起贊行三獻禮主者子弟姪并婦等主三獻詣案前贊跪皆跪獻男各奉考斚婦各奉妣斚起皆起贊復位拜樂作興拜興拜興拜興平身樂贊止焚幣徹𧃊鼓吹迎神亭返墓祭祠后土儀設席奠牲槃三豕雞魚籩豆槃八果二餈二臘二醢二清鍾槃二湯飯紙幣贊就位以次貴者主之贊跪祝告祝讀贊文畢伏樂作興拜興拜興平身樂止贊行三獻禮主者詣案前贊跪贊初獻贊再獻贊三獻起樂作拜興拜興平身樂贊止焚幣徹古墓祭有用牲牢者椎牛祭墓是也有用牲鼎者使奴入市買肉是也但三禮不及墓祭遂鮮考據此倣佛廟祭而以通俗例行之其鼎俎籩豆各有槃槅此非杜撰明制宫中小祭獻及小燕享俱用之便于行庖李獻吉傳中所稱攢槃者是也今俗亦名攢榼大抵時俗所通用者今一凖以鼎俎籩豆之數則通俗而仍不失古制大意所謂禮貴達情者此耳餘說見前特牲諸禮凡衆賓兄弟皆可酳尸此三獻與前時祭嵗祭終獻皆同周禮冢人職凡祭墓必以冢人扮后土氏尸以祭墓必當祠土神也今俗例亦有之但俗行在祭墓前今移在後用宋儒禮云祝文式用宋製維年嵗次月朔日辰孝子某敢昭告于某親某官府君之墓嵗序流易雨露既濡霜露既降瞻掃封塋不勝感慕謹以潔牲庶羞祗薦嵗事尚饗祠后土祝文式維某年嵗次月朔日辰某官姓名敢昭告于土地之神某躬修嵗事于某親某官府君之墓惟時保佑實賴神休敢以酒饌敬伸奠獻尚饗清明霜降不能兩行清明用牲牢鼓樂儐贊奠獻男婦俱詣故謂之祭若霜降祗可用鼎俎籩豆黍稷清鍾數槃而餘俱無有則薦而已矣然但稱祭不及薦者以祭可該薦且古無墓薦名色既將議禮則一名亦不可杜撰防自用也是譜極辨正朱禮之謬而獨于墓祭二祝文純用朱禮蓋不敢自為制作如此祭外神禮附若外神之祭則莫如社古天子祭天地凡大示地示圜丘方澤諸祭皆主天地大神言此惟天子得祀之若又曰土示曰五方之示則雖同是地而祗及方神所謂五方之社自諸侯大夫以下及士庶皆可私祀故祭法云王自立社曰王社為羣姓立社曰大社諸侯自立社曰侯社為百姓立社曰國社大夫以下成羣立社曰置社此直如後世里社之制凡一鄉一井皆得設壇壝以申禱賽周禮所謂州社市社春秋所謂書社千社清丘之社皆是也但古禮國社侯社明分為二而今則祗以社稷一壇當國家之祭非州縣官不得與而民間社祀則另設城隍土地諸神載在祠典城隍惟官祭而土地則各方各里皆得下逮是土地一祭其即古者民社之遺與苐其神則古以后土為土神共工氏之子名后土農與稷為田主之神厲山氏之子名農稷即棄也今世俗亦多立名氏以徼敕封然率不典無可據則祗虛其名曰土榖之神而已若其祭期則用春秋之二仲隨俗定日明堂位云春社秋省載芟傳春藉田而祈社稷良耜傳秋報社稷古但言春秋而日則卜之至其儀其物則應有牲幣粢盛巫史鼓樂等以諸禮云司祝用牲幣季冬命太史賦犧牲諸侯社稷用少牢惟社丘供其粢盛與奏太簇歌應鐘舞咸池與男巫望衍女巫祓除今上已祓除亦名社祭等則夫社酒社飯社肉社旗社鼓社簫雖草野朴略不無可笑然亦古禮均有之非戲事也周禮大司徒云田主各以其野所宜木遂以名其社與其野謂農稷為田主神其所樹社樹則各以其土所宜之木樹之遂以名其社與野如樹松則曰松社松野樹栗則曰栗社栗野類此即後世櫟社枌榆社之所由昉也朱子不解田主為田神以為用所宜木為社樹又用此社樹為田之木主故其注魯論哀公問社章謂用所宜木以為主此錯解周禮文又錯認齊論哀公問主于宰我是社主遂兩騎其說而周章為言即語類答問尚不能決不知社主之制以石不以木見春秋周禮諸注故唐神龍中議立社主韋叔夏等引吕氏春秋及鄭𤣥說以為社主用石又後魏天平中太社石主遷于社宫則是社主不用木一語可決無煩擬議也餘見豫論語稽求篇次則司命祭法王為羣姓立七祀一曰司命周禮大宗伯以槱燎祀司中司命司中者文昌第五星司命即第四星也蓋天子祀司民司祿而諸侯以下多祀司命故楚詞九歌有大司命少司命大司命為三台中之上台主司命為太尉少即文昌宫星今世士大夫家多祠文昌此本五祀七祀之一且又為歷代所恆祭此祭神之最近古者特後世以梓潼張姓者當之則誕妄耳其祭期當在春時以春祀司命冬祀泰厲也其物用特牲次用黍稷用酒醴設饌與五祀等禮器注凡社稷五祀皆三獻其特牲或用羽牲古祗翰音今鵝鴨皆是或以牲體代之皆可諸外祭用牲倣此次則方嶽之神周禮大宗伯以血祭祭社稷五祀五嶽注五嶽者東泰南霍西華北恆中嵩也五祀五嶽皆諸侯以下所得祭者但晉後極重東嶽今世相沿亦祗曉東嶽之祭此雖與五祀室神疏戚稍别不必定祀然祀亦無礙若謂季氏旅泰山到底是僭則季氏之旅本就泰山而祭之其名曰造且又以遍陳羣神之故其名曰旅造與旅皆祭之大者大夫有此自是犯分若今世爵閥原有貴于諸侯者諸侯即當祭五方五祀山川社稷嵗必遍舉誰謂泰山不可祀也又次則古聖賢之在其地者生其地如濟南祠伏生北海祠鄭康成類居游其地如桐鄉祠朱邑沔陽祠諸葛忠武侯類古于先聖有釋菜釋奠之禮不尸不舞不備儀物不卜時日自天子至中下士皆可行之則孔子先聖漢儒先師在春秋二仲州縣官既主殷祭而釋菜釋奠則學士隨時可行今徒以官祭之故致不學之儒反謂釋奠私祭為僭為褻而州縣官亦遂禁士子入學私祭是尊而不親將古禮所稱入學摰師博習親師諸義悉蕩然矣今欲入學祭則或致煩黷當先擇祠宇然後卜日設位合諸士子或子弟行事其儀物則設饌奠酒必潔致芹藻以少存釋菜之意鄭氏曰釋奠者設薦饌酌奠無迎尸以下之事鄭司農曰釋菜以古者士見師奉菜為摰菜直是疏食菜羮之菜此與天子釋奠必合樂享幣不同蓋今之殷祭古亦名釋奠而釋菜則薄祭下逮學記曰皮辨祭菜文王世子曰釋菜不舞不授器一獻無介語是也若五祀則嵗遍焉五祀見于儀禮周禮及禮運曲禮王制月令祭法曽子問諸經甚備大抵皆天子諸侯大夫以下及士庶人之通祭祗天子加二祀士庶或減二或減三耳若五祀之神則往有不同祭法以司命中霤國門國行公厲為五祀月令以户竈中霤門行為五祀而白虎通劉昭范曄髙堂隆諸君則又以門户井竈中霤為五祀今斷從白虎通諸君者以司命别有祀公厲則在官于十月朔有鬼神壇之祀此即周禮冬堂贈無方之祭也行則與門與户較于出入稍重復而祖祓行道又非尋常所當祀則一如月令春祀户夏祀竈季夏祀中霤秋祀門冬祀行而以井改行為五者之神嵗必遍焉嵗遍者言每嵗必周此五者也但貴則周之士庶則或祀竈或祀户已耳若其祭期則月令每祀三月凡十二月皆有祭而獨中霤祗季夏一月多寡不均且季夏一月既祭竈又祭中霤覺煩溷無紀因祗以四立日并季夏之朔行事一凖月令四孟迎立主祭之義較為精確若儀物則古用羊牲今亦苐用羊而一如月令之户先祭脾竈先祭肺中霤先祭心門先祭肝井先祭腎或祗用此五物而羊牲以牲體代之于是祭黍稷祭醴設饌凡三獻鄭注所謂五祀祭獻必以三為度者若其祭所則古禮先設席在奧而後迎尸而祭于其地今無尸無奧則但設主而祭其地可已雖孔疏有殷祭在廟周祭在宫之分然此皆室神凡宫室皆有之不必廟也若荀子又云五祀執薦者百人侍西房此以禘禴蒸嘗及大祫為五祀與此不同辨定祭禮通俗譜卷五
