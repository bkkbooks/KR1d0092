body:
  text: 辨定祭禮通俗譜卷三翰林院檢討毛竒齡撰五祭儀六祭器附見七祭物附見正謁儀迫日前一日除夕詣家堂掃除設位設六案六長兀其一負中􅡕南向近西為太祖位其一負中􅡕南向近東而去􅡕半武為世室位其一負左壁西向北上而去壁半武為髙祖位其一負左壁西向南下為祖位其二負右壁東向一北上一南下為曽祖位考位香案設長案于前罏一燭臺二東下案壺一盞十二傍設澡槃帨有架階下大罏有棜禁主人等主婦及弟子姪并婦易青服盥啓祏出主并祔者牌宔俱出匰主去冒安主男奉考主女奉妣主各安于長兀之面每兀安二主并祔者張影幛其有影幛則張幛于祏與壁前使主負焉焚香灼油燎奠酒男安盞考主前女安盞妣主前薦籩四豆四告此自告無祝者以告曰某年某月某日孝孫某等嵗謝謁敢告降于庭拜二男揖拜稽首起揖又拜稽首起揖為二拜女肅揖拜扱地跪不起遇男揖則肅拜又拜扱地起肅揖為二拜男手尚左女手尚右焚幣紙錢出元日正月朔日主人等詣家堂盥易盛服焚香灼油燎奠酒薦籩四加籩二薦豆四加豆二告某年某月某日孝孫某等祗修正謁敢告降拜四焚幣出是日即奉主入􅡕徹幛俗有延至五日者不無過褻然習俗難挽則亦聽之若元夕欲修謁則于本日自午至夜分始徹加華燈焉宗堂儀如前以長房長孫為主餘以次昭穆列不婦俱餘同朱禮凡謁儀皆有降神一節預設茅沙盆至焚香後酹酒于茅沙之上以降神此世所共遵者但降神必用灌鬯此本天子諸侯之禮大夫士以下惟時祭偶用之而竟以是為常儀則褻甚矣且茅沙之名古並無有郊特牲曰縮酌用茅左傳爾貢包茅不入王祭不供此謂祭時用濁酒以茅泲之所以去滓故鄭注曰涑之以茅縮去滓也惟周禮甸師貢蕭茅鄭興謂蕭讀如束束茅立之而沃酒其上有似神飲此是妄説且祭啐酬酢所以厭神亦並非降神之解而公然立一儀注可乎況沙是何物也器祭有几有筵詩所云肆筵設几是也今世無几筵之之製凡鼎爼籩豆統置之案固無如何也若神坐用席而今以椅代之則室狹不給案凳之髙足而上平者為兀今俗所稱兀子者其以安諸主頗為省密故借用之其匰宔祏􅡕諸名見前祭出主薦不出主此較薦又殺而反出主者重正朔也但主在匰中而又有冒者宔主也而從宀則主有冒矣大抵古制主式以四方之木為之穿中央而達四方如古碑之製四面皆均齊可書古碑製正方如柱所以繫牲又所以懸棺故碑又名柱馬援傳銅柱是也其云穿中央者以四方之木穿于趺間而趺亦正方然較寬于木而達于四方之外曰達四方也于是而加冒于上名之曰宔此公榖傳注何休范寧徐邈及公羊疏所引孝經説文俱如此説則是一顯然足據之古制而宋儒倔強必自造一式載于朱禮明代數百年皆遵用之真是可怪且其所造式則又自蹈于僭罔而不自知者案古制皆云天子長一尺二寸諸侯一尺而唐儒楊氏載糜信引衛次仲言則云右位八寸左位八寸一作左位七寸誤則又從諸侯而稍殺者右位父位左位母位也列宔匰中父右母左今朱禮一尺二寸則天子禮也陋儒作主惟恐稍乖分寸有戾古制至考周尺三司尺司馬溫公家尺式以致畫一尺圖于朱氏家禮主式之首而不知其僭越之罪乃至如此尺愈精則罪愈大矣先仲氏曰古人簡牘皆用四方木四面書寫碑有書隂者有四面書如顔魯公家廟碑者皆質朴簡易原不必如今主式剖其體鏤其腹背面曲合取艱巧者推此言則似前面書考妣如先考先妣先祖考先祖妣類官閥如誥敇授贈何官何階類稱謂如某府君某處士某郎某公類後面書諱氏生卒時日旁面書子姓奉祀最為得體若其長當限一尺從諸侯尺度者亦猶祀四親之從諸侯禮耳説文廟者貌也尊先祖貌也古今注云所以倣佛先人之容貌則古原有遺像追享之事或以為影堂起于後世非是古祭服即是朝服以祭重貴貴非貴莫祭故天子諸侯大夫士皆有朝服而于祭則並用之謂之朝祭之服少牢諸侯大夫祭以朝服又禮注士祭以朝服中衣以布皆是也若婦命服則隨夫所服命數而各有隆殺列代服制俱有之朱禮用深衣為服則玉藻云朝玄端夕深衣皆大夫士私朝家居之服似乎稍褻惟庶人無服可以通用然庶人自有本等服色深衣古制總不相宜也祗古人朝服亦是另製非常時所服者孟子云夫人蠶繅以為衣服周禮內宰四時皆詔王后帥內外命婦蠶織采黼以為祭服今能之乎若謁前一日用青服則比之齋服玄端素端皆用之此斟酌之尤善者世毋以小節而忽視之可也徐仲山曰王制云有虞氏皇而祭深衣而養老深衣列代各有用罏者薰器漢官典職曰尚書郎給女使執香罏大罏火函一名火牀左傳邾莊公廢子罏炭其有棜禁者謂有架如輿四闌庋足所以承罏比之壺尊之有禁托也燭臺者插燭之錠也壺即尊也所以儲酒其名壺者以瓠可為尊莊子五石之瓠何不慮以為尊賈誼弔屈原賦有康瓠郭璞曰康瓠壺也澡槃盥器帨用以拭洗者盞盛酒器也爾雅鍾之小者謂之盞明堂位曰夏后氏以盞籩以竹為之而有縢緣豆若脰然爾雅竹豆謂之籩木豆謂之豆瓦豆謂之登今竹絲漆器即籩也磁器即瓦豆少牢饋食有瓦登士喪禮有瓦敦皆同物古焫蕭即焚香也以是時南越五木未入中國故止以蕭艾之屬行之凡合鬯祭蕭皆用諸草如樂府迷迭艾蒳之類則近代香泥條餅雜取諸草合成者自可爇用若黍稷脂膏燔入牆屋總不過達臭之意且非士庶所宜用説見時祭儀下古燭有薪燎油燎二物油燎即今之燭也楚詞云蘭膏明燭謂以油作燭也爾雅云燈者錠也即膏鐙也而郭璞注云古以人執燭今易之以鐙則鐙即燭臺可以代人手執者故詩傳顔叔子使鄰婦手執燭達旦則薪也何也下文云燭盡縮屋以繼之縮屋縮薪也若曲禮燭不見跋則油燭也何也跋者本也足也薪盡則火易焉有留其足以示客者惟油燭則下有足跋將盡即見故先仲氏曰禮記庭燎之百必是油燎若草燎則庭楹幾何難以百矣舊注亦以百燎難解謂用葦百莖纒布而塗之以蜜則縳葦作炬何止百莖且莖草多寡並非炬數何足定天子諸侯等殺且既已纒塗誰從核數而以此定齊桓之罪何儒者不通一至于此徐仲山曰蘭以香自焚膏以明自煎此指今香燭二物若周穆王列蟠膏之燭燕昭王燃龍膏以為燈皆是油燭世但知石季倫以蠟燭灼炊唐詩漢宫傳蠟燭謂漢晉有之要不識事始耳紙錢代幣帛此是明器而陋儒非之按宋朝以道謂紙錢始于殷長史自漢以來里俗稍以紙寓瘞錢至唐王璵乃用于祠祭其來已久先仲氏嘗謂阡張紙即古刀布形故其鑱刻文有如如者卷紙而束之即帛也糨錫紙為錠形即裊蹄也且古今不同制今宫室几席簠簋籩豆亦何一不從時制而獨于香燭紙錠斥為非儀鄙哉楚辭華燈錯些華燈燈之飾于外而有華者非今燈乎祭品有鼎爼定有籩豆郊特牲曰鼎爼奇而籩豆偶所以别于隂陽之義也故鼎爼自三而五而七而九皆奇數籩豆自八而加六加四加二皆偶數朱禮動輒用五或至十五俱非古義若籩實乾實豆實菹醢皆非牲體脀載之物今嵗事所實當以嵗果四如棗脯棐胎之類嵗餌四如褁蒸飴糝之類其加籩加豆當用嵗修如朐䏞臇臛之類祭禮無茶今偶一用之若朱禮每稱茶筅吾不知茶筅何物且此是宋人俗製前此無有觀元人有詠茶筅詩可驗或曰宋時用茶餅將此攪之然此何足備禮器乎用茶在時祭儀拜在庭即堂下也古宫室制堂前曰庭堂後曰寢皆割堂之前後半為之故同一堂而中堂與前庭分焉中堂名堂上前庭名堂下所謂下者正堂前之庭非階下之墀也今拜在墀下誤矣尚書下管鼗鼓禮記下管象舞凡管鼗諸器象簫諸舞俱在庭中所謂下也論語八佾舞于庭是也不然豈有宫懸列舞在露地者又周夷王下堂而見諸侯謂不在中堂負扆而在庭中禮所稱兩楹之間名路寢者是天子退朝則坐此聽政之處而以此為朝諸侯之所故云下堂未聞降階朝諸侯也若論語拜下則燕禮覲禮君凡有賜則謙不敢當因降階欲拜而君止之然後升階成拜則拜禮所成原在階上豈階下乎儀東下西下及降于庭皆指堂前地言古無拜次起揖之禮凡裒拜再拜皆連作兩拜故以拜為伏以跪為起詩注起居跪居也今曰跪起則起跪而又起揖此近代拜儀所誤用者然無如何也若朱禮考證多非古法豫嘗通核之大抵最宜辨者惟拜手稽首頓首稽顙四等凡拜皆跪無所謂立拜者亦無不以手先至地而首下至手者所謂拜手也拜手統諸拜故周禮九拜無拜手一名其曰稽首者謂拜手而稽其首也稽者留也以首至手稽留不即起也頓首者拜手而陟起也頓者陟也空首空首振動皆九拜之名首不下至手虛之也振動者首與手略動而不下也若稽顙則凶喪之禮兩手無容解而據地而摶其顙于兩手之地間問喪所謂稽顙觸地而無容是也今稽首稽顙略無分别而鄭又誤注以稽首為首至地頓首為叩地則頓首稽首稽顙俱無辨矣苐拜禮最重稽首虞書益拜稽首臯陶拜手稽首周書王拜手稽首太保芮伯拜手稽首儀禮主人再拜稽首左傳趙盾踧踖拜手稽首孟子子思再拜稽首皆只是稽首並不及頓首不知漢後何時以稽首頓首並稱且不知何解又以稽顙為凶服重者稽首為凶服輕者于是民間通行但有頓首而無稽首則悖誕極矣姚立方曰頓首是急遽時所用大非常禮如左傳晉穆嬴頓首于趙宣子之門楚申包胥乞秦師九頓首而坐皆狼狽有求倉卒致情之儀豈可誤用故男拜皆稽首無頓首者手尚左左手在上也尚右右手在上也見檀弓注若婦拜有稽顙扱地手拜肅拜四等扱地即稽首言不起如控地然也手拜即拜手也肅拜但斂手上下如曲禮主人肅客而入左傳三肅使者之肅與振動相似而更為安徐推手引手略不震警此為肅拜故先仲氏謂婦人立而肅揖謂之長揖西征賦率軍禮以長撎言介者不能曲揖但推引其手謂之長撎撎者揖也鄭司農肅拜注曰若今之撎長者不曲也今人以曲揖為長揖非也跪而肅拜謂之長跪樂府伸腰再拜跪言直身而跪推引其手即是長跪跪者拜跪也長不屈也今人以一足跪為長跪非也則是婦拜扱地與男子同而男起而揖婦跪而肅正復相等至稽顙則用之重凶拜手則用之輕凶而扱地則正為見舅姑謁先廟之儀見少儀及儀禮注若朱禮肅拜與空首同且與手拜無分别則禮有婦人不手拜而肅拜肅拜而不手拜何以辨之朔謁儀每月朔日詣家堂掃除主人等常服焚香灼油燎啓祏闢匰門不出宔不告拜二儀如前闔匰祏出宗堂儀如前器匰如屋平頂而前有槅門時祭儀春分秋分二祭日同齋戒前三日古有諏日卜牲筮尸之文今家不藏龜并無筮人自可不用若尸則三代以後並無及者惟齋戒之禮必不可缺古者三日齋七日戒今斷以三日使易行也齋者不飲酒不茹葷謂不食蔥蒜胡荽之類戒則男女異寢處不弔喪問疾并不預凶穢雜事齋服青見前迫日前一日掃除室堂室即家堂堂者前堂三間也若下祭只在家堂中設位家堂設六案六長兀如正謁儀南前堂設六案十二椅并祔者之椅其一負中屏向近西為太祖位其一負中屛南向近東而去屛半武為世室位其一負左牆西向北上而去牆半武為髙祖位其一負左牆西向南下為祖位其二負右牆東向一北上一南下為曽祖位考位香案家堂前堂每案設罏一燭臺二家堂東下案壺一盞十三傍設澡槃帨有架前堂同前堂東下案尊壺各一爵十二斚十二畫鍾不計數西下案樂器大同板小同鼓銅吹鼓簫如笛祭管設笙中絃拍大小下俱室階下大罏有棜禁擇儐二人即弟子姪中擇能者為左右儐左儐司贊唱右儐兼祝嘏如上祭則祝嘏另設二人庖四人樂員四人即歌師樂神之員也或清樂能侑燕禮者亦可用主人省牲羊一豕一豕下祭祗用殺牲刳滌藏堂下側室瘞毛血授庖薦槃六副槃六鼎盂三十爼槃三十十上祭加二鉶碗三十主婦授內饔即內婦婢簠簋十二清鍾十八籩四十八六上祭加十豆四十八十上祭加六帥諸婦弟子姪婦辦簠簋籩豆所需實者謁薦獻奠貴賤通行惟祭分三等見前卷下祭祗及三代中祭及髙祖始祖上祭并及諸祧如祫禘禮則上祭但加之冬至一嵗祭其二分時祭上中均等所略殊者上祭增儐二牲爼二加籩加豆各二耳若下祭則但不出堂而祭于室説見前卷減二鼎二獻其餘皆同故凡增減者略分注于下便自瞭然若祭薦之分前屢言之總是有牲有常時曰祭無牲有常時曰薦無牲無常時曰獻有常時而儀總殺曰奠各隨其輕重而以意行之可耳器壺義見前壺即尊也周禮司尊彞云朝踐用兩壺尊饋獻用兩壺尊大凡祭有尊有二尊者儲酒之器也二者副也謂用一尊又備一尊也但古有多尊復多二者如大祭八尊有二又大祭三二則祭祖為中祭亦原有中祭再二之文此祗一尊一副者以今無尸酳無旅酬用酒不必多也或曰尊壺非兩物左傳曰樽以魯壺禮記云五獻之尊門內壺又云尊用壺而不用缶似壺本尊中之名然特牲禮云視壺濯尊則既壺又尊顯可兩用況壺製有方圜壺有吭尊無吭則以尊寫壺以壺寫盞分用尤便至酒器有盞有爵有斚此用三代祭器以進獻者明堂位曰夏后氏以盞商以斚周以爵三者本三代分器而在祭時嘗兼用之如詩曰洗爵奠斚記曰盞斚及尸類特制有小大盞最小説已見前爵則形類雀而有足較大于盞斚則如甌而有兩耳或曰可受六升雖未必然然較爵大矣禮獻爵貴小不貴大故禮器貴者獻爵賤者獻散尊者舉觶卑者舉角此皆過為隆殺之言今限以三品小不踰盞大不過斚則雖三獻五獻七獻以漸加大而仍不失之角散之賤特其製古必用玉用瑶今擬以玉盞一金盞十二金即銅也此當用白金金爵犀斚各十二稍備華貴至畫鍾若干者説文鍾酒器古凡土木祭器多畫以為飾如畫山畫罍類其所備之數則祗一盞備灌其諸盞爵斚畫鍾俱備三五七獻并酳神之用非泛設也罏燭臺澡槃帨大罏俱見前古壺尊觶斚皆有托以庋之其庋壺尊者謂之棜禁庋觶斚者謂之豐舟皆承托之器也今稱壺尊之托為架稱觶斚之托謂匜俗亦用之但古今製各不同壺底平則不用架杯有足則不用匜且尊者廢禁以庋足髙卑為隆殺其足卑而如無禁者翻謂之尊如儀禮廢爵廢敦類則何如無禁為更尊也若壺尊有勺所以挹酒而注之爵者古有龍勺蒲勺諸名皆用木為之而刻龍蒲諸文于其間今壺有吭可寫酒故亦不用或尊用一勺見後儀古祭祀皆有歌樂虞書以搏拊笙鏞饗祭使祖考來格商周有頌詩頌樂列代有廟樂禮運凡祭列其琴瑟管籥鐘磬是也故諸祭惟日祭月祭不用樂若時祭嵗祭大祭則皆用之郊特牲謂饗禘有樂而食嘗無樂此是妄言觀祭統內祭則大嘗禘升歌清廟下管象是秋嘗有樂也但今世士大夫家不畜樂工不貯樂器而鄉俗師巫婆娑樂神則又非正祭所宜用惟歌師以歌曲鼓吹能作迎送神曲者最與古合否則以樂人宴侑者當之雖不能自製樂章别設宫調然祗近代通行金元曲名在明世太常廟樂皆襲其聲如所稱朝天子殿前歡類今皆可用此正凖今酌古而兩無礙者孟子曰今之樂猶古之樂也大同小同銅吹皆響樂也周官太師掌六律六同律者竹管同者銅管鄭注云以銅為管曰同大同即漢晉銅角之製小同喇叭也樂部有大橫吹小橫吹名為銅吹即今灑捺也古行之燕饗之樂而後世軍中鐃吹雜用之名為響樂此今樂之最近古者若簫笛管笙絃即古絲竹匏三音而竹匏形製亦俱照古不改惟絃則琴瑟煩重各代以二絃提琴三絃絃子然亦古絃鼗遺製所以逐聲節樂者即拍板代木亦隋唐器也至樂府有神絃曲即琵琶楚詞吹參差兮誰思參差笙也若近代有神簫神鼓諸器則别有形製總不可用禮器堂上罍尊在阼犧尊在西堂下縣鼓在西應鼓在東則壺尊樂器其所列之位既分上下又分東西今壺尊不在上而亦在下者礙神位也且壺尊俱在東樂器俱在西者以一尊一壺則壺為尊之二不能兩分若樂器則案架相依别無虡栒何能對列耶則即此一列亦斟酌有據如此古有左儐右儐為贊唱而設唐開元禮有贊唱員二人禮運修其祝嘏祝以主人之辭告神嘏以神之辭告主人此另是二人今但設引贊一人通贊一人以當左右儐而祝嘏兩告則即以通贊代為之祝文告孝飲福告慈亦無有缺若上祭則增設二人更為美備耳周禮庖人掌供祭祀物羞即籩豆所實物也內饔掌祭祀割烹之事即鼎爼事也今反以鼎爼屬庖人以簠簋籩豆屬內婦即內饔類似乎相反但庖人主辨畜食物并市買庶羞原該內外二饔之職今不能多設饔人則割烹在庖而餘則內人自主之此正相需為禮者何相反乎王制注諸侯祭以太牢得殺牛大夫祭以少牢得殺羊曽子曰諸侯祭牲曰太牢大夫祭牲曰少牢士祭牲曰特豕屈建曰國君有牛享大夫有羊饋士有豚豕之薦則是天子諸侯皆用太牢牛羊豕三物惟大夫祗少牢羊豕耳今太牢之享自天子而外皆無此禮雖上祭貴于諸侯下祭不及大夫亦斷以少牢為度所謂酌貴賤之間而得其中耳若古殺牲必當日而此先一日者古君親殺牲今不親殺不惟鸞刀割刀貴割賤割今無此禮只祭貴精潔臨期刳滌必不精腥血滿庭必不潔況事死如事生豈有人子生前曽司屠宰而祖父親御庖割以食之之事禮有必不可行并不必存其意者尸與此等是也瘞毛血亦隨地瘞埋已耳且不必告朱氏禮有進毛血禮按禮祝告毛血名告幽全以其血備名告幽以其色純名告全全者毛色不雜所謂祝詔于室者正詔此也今祭無牲毛之等無赤白黑三色之辨無純雜之分則持其毛以進將欲何告不告而猶進之將何為此豈可食乎今世凡禮祭俱無一不悖古禮而獨于毛血一節遵行不徹觀此可廢然返矣古有生牲入俎者如豚肩不掩豆類有熟牲入爼者如熟其殽類有炙肉如薦其燔炙類有烹肉如毛炮胾羮類但其制有先後而器之大小因之蓋殺牲煮牲炙牲烹牲皆在廟中故自殺牲後先以生肉入爼所謂薦腥也然後將生肉煮之于鑊復入爼薦之所謂薦熟也但其肉未爛復將熟肉投之于鼎而烹之所謂鼎也又將鼎肉以七出之而陳之木梡之上所謂爼也又將鼎肉入之小鼎而和菜作羮所謂鉶羮也故在廟中先有鑊鼎爼鉶四器周禮小宗伯祭之日省鑊詩何以湘之維錡及釡皆鑊類所以煮牲今付牲在庖可無此矣詩鼐鼎及鼒皆烹牲之器器有大小故其名不同天子諸侯有牛鼎大夫有羊鼎士有豕鼎皆不一器但每一鼎必有一爼一鉶爼以木為之平面如槃而下有足鉶則鼎之小者今三器俱無其制矣苐器制雖亡而用不可缺古鼎用銅今以錫代之如盂而上有髙蓋每獻則啓蓋作趺而安盂身于其上故名鼎盂爼代以槃而去足名爼槃副則槃之略減小者鉶直以磁盂為之便盛羮則曰鉶碗而已若又不能則或純以磁為之而大小花色分作三等亦可用鍾酒器名盞之大者曰鍾簠簋所以盛黍稷者今易以小木槃以古有敦槃之名皆黍稷器也籩豆見前古壺尊鼎爼皆有冪所以覆諸器而拒塵土者今北方尚用之南則否又鼎有七用棘木為之所以橫概牲體而升之于爼今鼎爼悉付之庖矣且升爼之物不必即鼎物故不用辨定祭禮通禮譜卷三
