body:
  text: 辨定祭禮通俗譜卷二翰林院檢討毛竒齡撰三主祭之人凡祭必以子祭典惟子祭父為最重自七廟以至一廟凡廟皆殺而父廟獨不殺則祭父之重明矣故自天子諸侯至士官師有廟無廟無不祭父即凡有廟者一遇父喪輒斂羣廟主而藏之始祖之廟未葬不祭雖曰吉凶不並行然亦重父而輕祖以上之祭故如此今宋儒立説謂不祭祖先失報本追逺之義此程伊川語因創為祠堂合祭先代知祀逺而不知祀近而文公著禮則又以宗子主四親之祭使凡為人子者不解祭父但納一主于堂側而隨族拜獻其所祭四親係他人之親並非己親所祭之父係他人之父並非己父即間有稍知禮意不安于心使各房分獻夫分獻則一杯之酒何能遍及若敖之鬼嗟乎餒矣故特創一語曰凡祭必以子此祭之綱也凡祭者謂祭無不然也宗子之制在春秋時已失傳矣漢宋諸儒茫然不解予嘗作大小宗通繹以解之故以今日而言宗子不惟阡陌之世不問井地郡縣之代勿議封國實亦夢中説夢之一事也乃論禮之家必以宗子主祭為知禮强襲其名種種違悖此三家叔孫不通之尤甚者請歴言之古之宗子必以天子諸侯之第二弟為之稱為别子别子者餘子也今反以長支長孫當宗子是長而非次正而非别不通一也天子諸侯尊貴其兄弟輩皆不得與之聫戚戚之誼戚戚親親也見大傳因别為之宗以使之自戚其戚今自世家巨閥以至白屋其兄弟輩並無不戚而反立宗以戚之則誰當踈者不通二也古一君有一宗故魯在春秋有十二公即有十二宗儻前後推之則為宗無算而今以一人一宗當之不通三也亦惟一君有一宗故所分之宗亦即以宗此所分之君如魯桓一君其分一宗為桓氏即三桓也三桓宗桓公故立桓公一廟于桓氏為三家之堂而世世宗之宗者宗此君也大𫝊所謂宗其繼别子之所自出者是也魯宗文王故立文王一廟名出王廟見左傳今苐長房耳何得使通族皆宗長房不通四也且亦惟一君有一宗一君又必有諸族如桓氏為一宗而三桓兄弟分仲孫叔孫季孫三族等而下之分族無算是以晉叔向曰肸之宗十一族惟羊舌氏在而已是立宗為收族而設立一宗所以收諸族大𫝊所謂君有合族之道又曰敬宗故收族今一宗族耳不分何收不散何合不通五也古者分宗族即分姓氏天子諸侯不更姓如商為子周為姬類而宗子則易姓而為氏如魯之展氏臧孫氏類降此則又分氏而為族如三桓之又分為公父族子服族類今宗子易姓否宗子之下又易氏否不通六也古宗子皆卿大夫世官為之故宗卿之子恒為宗卿絶則繼之所以藩屏邦國為天子諸侯本支之翰詩曰宗子維城大宗維翰是也今族非邦國有何藩翰且前無世官後無繼襲以無何有之庶賤而使之扞衞宗族能乎不通七也若其最不通者宗子主祭下限四親夫四親者父祖曽髙也宗子長房分多卑幼以通族之衆而宗子以卑幼統之其等世者有兄弟其先一世有伯叔父先二世有伯叔祖父先三世四世有伯叔曽髙祖父長房惟始祖之子居長一二𫝊後即有不能居長者矣故四世俱有伯氏而皆在助祭之列宗子居中伯叔氏居兩傍宗子為主伯叔氏為助至問其所祭者則宗子之父祖曽髙也宗子之父祖曽髙皆非諸伯叔氏所當祭者宗子非君而通族老幼儼然助祭諸伯叔氏非臣而儼然帥通族之老幼以祭此宗子之親是無君也以尊而祭卑以衆大而祭四小是無長上也不祭已之父祖而祭他人之父祖是無親也無親無君無長上三綱亂矣是此一主祭而凟倫蔑紀畔制逆理莫此甚者奈何貪知禮之名而甘蹈于大無禮至此極也其不通八也或謂祠堂有始祖故可陪祭則下限四親上及始祖儼七廟矣故朱氏家禮亦不設始祖之主于祠堂之中可驗若祠堂通法汪司成東川謂族長主祭而不限四親則在堂之主皆主人通族所當祭者以此仿諸侯大夫之祫亦無不可若金華唐氏祠堂製中祀始祖傍祀十世祖逺則祧之而四親之祭則各房各祭于家此則通變之最善者并附此以備參考子必以長若次嫡則攝之諸子雖異居必従長者合祭之其同居不同子與孫而為子則否祭必以子子必有兄弟但周制兄弟最嚴嫡庶不惟嫡庶并嚴長次惟長嫡可以主祭次嫡與庶皆名支子則皆不得主祭然此惟封建之世天子諸侯卿大夫惟長嫡得襲次嫡即不襲故古之重嫡非重嫡也重貴也若重嫡則次嫡母弟獨非嫡乎不得主祭祗以貴故而妄云重嫡寃矣或云長嫡主祭則次嫡自不便並主故曰支子不祭非以貴也曰不然支子不祭非謂與嫡子並主祭也謂嫡子有故不得祭尚不許支子主祭而必告祖而攝之非重貴而何今一父之子嫡不必貴庶不必賤則何論嫡庶而三家叔孫尚曰子非嫡不成父後夫成父後者謂父為天子諸侯公卿大夫士而其後當成之也今既不世爵父即貴耶然後之者不必貴嫡可成庶亦可成也父儻賤耶庶人耳何後之堪成夫嫡不必貴嫡不必成父後則嫡庶可不分矣不分嫡庶當分長幼嫡長嫡主之庶長即庶主之此天倫也然而嫡庶之名仍在也先王重嫡之意終不可以已也因定為攝主之法其長庶為主而有嫡弟者則位長者後盥灌禮畢則揖嫡主初獻禮然後長者以再三成之若攝主然不告攝但比攝耳則嫡亦重矣若夫兄弟雖異居而必同祭者重同父也同堂兄弟雖同居而必分祭者以彼自有父也故宗法宗子主祭則宗子一世必親兄弟宗之宗子二世必同堂兄弟宗之三世必再従兄弟宗之皆以兄弟起見今封建不立宗法難明則祗以同父之子為之共祭一則重父祭一亦支子不専祭之義也至孫而為子謂主祭者之猶子則所祭之父之孫也萬一主祭之兄弟夫婦偕亡則此猶子者本孫也而今為子矣為子當祭父于是立考妣之主而分祭之而祖曽與髙與始祖則設牌焉見前若兄弟夫婦有一亡者則祔于祖堂以俟後之入祭室殤無後同見後祭則祗以子兼孫兼曽薦則兼𤣥孫逺孫祭止三代薦可及髙祖始祖祭有時有牲備儀具物薦則設饌而已詳見後前既已言之矣子兼孫曾即三代也兼𤣥兼逺即及髙與始祖也或祭或薦分不同也此下士官師庶人之通禮也子有如士官師者則攝之若以𤣥孫逺孫祭則如大夫者主之薦則否凡祭子婦俱逺孫則否母在則帥諸婦而先之妾則否以並諸婦之先者先仲氏曰古祭等有五天子祭七公諸侯伯子男祭五卿大夫祭三適士中士祭二下士及官師庶人祭一今分為三天子有大禮不敢妄議若適中下士官師庶人則合二為一以殺禮不貴𤨏也如是則祭止三等矣但此三等中以祭三代不祭髙祖與始祖者為下祭凡如士官師及庶人主之適中下士即今貢士博士弟子類官師即庶人在官者内而知經博目外而丞簿尉使皆是以祭及髙祖始祖者為中祭凡如大夫主之禮大夫祫及髙祖大夫始封得立始祖廟則大夫可祭髙祖始祖明矣此如内之曹寺正員外之州郡守令皆是以并及諸祧如祫祭者為上祭凡如公諸侯伯子男者主之内官天子卿士即比諸侯若三公則方連矣故不論品級内之如舘閣臺垣及曹寺堂上外之如監司以上皆是然累朝官閥不同不敢遽定此大略也今祭三代者仍以子長者為主而其諸子中有如士官師者則攝之使位長者後而揖主祼奠其但主祼奠者以祭止三代則長者雖賤原可以祭貴微不敵親也若祭及髙祖始祖則必子之如大夫者始得主之親又不敵貴也何也此非長所可祭也若非祭而薦則長仍得以主之何也長固不可祭長猶可以薦也諸鬼皆可薦説見前至于凡祭子婦俱祭統所謂夫祭必夫婦親之詩𫝊所謂思淑女以供祭祀者曽以子祭父以婦祭姑而可不子婦共之乎主祭者與主婦俱諸子助祭與諸婦俱其曰凡祭謂凡祭三代與髙祖與始祖也且以别于逺孫之祭也故曰逺孫則否言以子兼逺孫而祭始祖者此宗堂之祭也宗堂則不婦俱矣父死而母尚在則母不主祭但統諸婦助祭者而先其列父妾則稍後所謂子無嫡庶而母有嫡庶僅與諸婦之在先列者差立而已至宗堂之薦以長支長孫主之兼燕若祭則如公諸侯者主之如者衆則衆主之主以貴次同貴以親次燕則否無薦宗堂在長支之家然長支為子之祭不異家堂而獨合祭祧主一祭則在宗堂者惟長支長孫主之此即宗子收族之遺意也其但謂之薦不謂之祭者以賤無合祭諸祧禮也若又兼燕者薦雖饌禮不用牲儀然多置几筵自始祖世室以旁及十祧宗堂四親惟長房主之故此不及也備設酒醴而使通族合餕之以當燕饗此即宗子主㑹族之義周禮大宗伯所謂以飲食之禮親宗族兄弟詩註召康公作棠棣之詩燕宗族兄弟皆是也若改而為祭則諸侯有祫祭此惟如公諸侯者得以主之然而燕則否者以燕終長支之事非貴者所得兼也祭在彼燕則仍在此也若一族有多貴者則合祭而各主獻分尊初獻餘以序従以親次不以貴次也然而已祭矣祭則無薦二禮不並舉也在官則設位而行之其在家則以諸子攝主之有告在官者在官所也古有載主以行之禮然巡守行師祗載祧主唯國君去國始得載廟主以行則廟主不易移矣不移廟主則在官祭親原須設位且祧主在邸又須辟堂以安之何如竟設位之為得乎古設位以帛茅今以紙徹則焚之諸子者兄弟行貴長則弟貴幼則兄古有攝主禮有告攝文其祭儀稍殺于所主者如不厭祭不旅酬類今厭旅諸禮既已不行則自無所殺而祗以兄弟之在家者攝而行之但長庶攝嫡祭三代攝貴皆不告攝此獨告攝者以彼長者所得祭此非諸兄弟所得祭也得祭者不須告不得祭者須告也此又攝祭之等也告文者告祖之文此如曽子問庶子為宗子攝祭有告文類其式見後四祭之時正月元日行謁禮正月元日者元正之謁也元正必謁廟春秋襄二十九年春王正月公在楚釋不朝正于廟也然則家廟必謁正可知矣謁不用儀饌見祭儀卷祭是吉禮凡凶喪之祭如初喪諸奠及虞祔練祥吉祫諸祭概不列入每月朔日行朔謁禮古有日祭月祭時祭嵗祭之分國語祭公謀父曰日祭月祀時享嵗貢又觀射父曰先王日祭月享時類嵗祀諸侯舎日大夫舎月士庶人舎時士庶人祗一祭二祭無四時曰舎時其曰舎者言無此也今不知日祭何等徧考經傳並無其文惟月祭則祭法有之然天子七廟皆月祭諸侯五廟惟父祖曽三廟月祭士庶無有且亦終不解為何等之祭若時祭則四時之祭祠禴嘗烝嵗祭則三年一祫五年一禘如是而已乃韋元成韋昭之徒則又曰天子日祭于祖考月祭于曽髙時享于二祧嵗貢于壇墠則不惟月祭廟數與祭法所記不合幾見時祭及祧廟者至漢法建祭無所考據但以祭地分别之日祭在陵月祭在廟時祭在便殿此尤杜撰之甚者今日祭月祭皆無確據且亦非士庶通禮不必詳核則但取日月之意而以月朔代之此亦本諸侯朝享一祭而降殺以為禮者葢朔者日之首每月朔則月之全也或曰朝享即告朔之祭亦即月祭按周禮春官太史頒告朔于邦國而左傳註諸侯告朔則每月朔以特羊祭廟而後頒朔而聴之然其曰藏于祖廟此是太廟而祭法諸侯太廟無月祭即韋氏等論月祭亦不及太廟則告朔不必是月祭然其意猶可仿也若朱氏禮有正至朔望四謁謂元正長至朔日望日作四謁節則古凡禮事有朔無望如士喪禮有朔奠無望奠且曰月半不殷奠夫喪奠最煩數尚不及望則吉禮無望可知矣朔謁諸禮惟家堂與宗堂原在屋内故可舉行若祠堂則稍逺矣朱氏禮云祠堂必近家側夫祠堂衆堂也衆堂誰近乎雖宗堂公祭亦是衆堂然有長房専主之故終嵗行禮祗一再及而閉門掩祏不嫌其疎若枵然一堂而二至之外朔謁不及月獻不及則神恫矣吾前所謂祠堂可用者亦謂改而為宗堂耳若不近長房又不近通族雖有堂安所用之春分日秋分日行時祭之禮古稱二祭禮四時之祭諸禮所載名稍有異同如王制祭統皆曰春礿夏禘秋嘗冬烝而其他禮文有稱春禘春禴者有稱夏祠夏禴者然要之皆四時之祭而已但四祭之全與缺純以貴賤之等為隆殺天子四祭諸侯三祭聴其自缺一時如云礿則不禘禘則不嘗嘗則不烝則大夫而下其必又缺可知矣故家堂正祭不拘三代五代或貴或賤而一以二祭為斷特二祭之中或祗及三親或兼及始髙則貴者當合啟三􅡕自朝至暮一齊共祭若賤則先啟左右二􅡕出主迎牲然後啟中􅡕而行獻饌之禮葢有牲曰祭無牲曰薦雖一堂共祭而迎牲啟􅡕畧有先後以稍存祭薦分行之意況古雖七廟並祭然其于時祭亦分祫合祭犆特祭如天子四祭一犆三祫諸侯三祭二祫一犆今但合主而祭于一堂則同牲别饌或分或合無所不可此皆酌古而不戾于今者若其斷以春秋者祭義郊特牲皆曰春禘秋嘗單舉春秋二祭為言故中庸禘嘗之義在舊註原指二祭孝經云春秋二祭以時思之即祭義有云春雨露既濡君子履之必有怵惕之心秋霜露既降君子履之必有悽愴之心亦但言春秋而不及冬夏此可驗也古祭卜日不卜月時祭定月經無明文惟鄭康成註王制謂祭以孟月薦以仲月此據晏子春秋天子以下至士皆祭以首時語故魏初髙堂隆曰按舊典天子諸侯月有祭事其孟月則四時之祭也仲月季月皆薦新之月也後魏詔亦曰有邑之君祭以首時無田之士薦以仲月唐時四祭各以孟月享太廟室此皆據鄭氏一語而列代遵之不敢移易者但按周禮王者享烝之畋皆在仲月未有孟月舉祭而仲月始田禽者又服䖍註桓五年傳云祭天以孟月祭宗廟以仲月于昭元年傳又云人君用孟月人臣用仲月則今以人臣而祭宗廟豈有擅用孟月之理況春秋桓八年以正月烝十四年以八月嘗使周正耶則正月孟月八月仲月一孟一仲使夏正耶則正月為十一月八月為六月皆非孟月葢烝為冬祭即或用周正之春而實即夏正之冬可知矣至于薦用仲月則月令所記或孟或仲或季皆無定時而秋則三時皆薦此考之經文而顯然者乃曰薦用仲月何誕妄也但祭必卜日今不行卜日之禮則必有定時而後可常行竊嘗擬二至舉祭此在禮文已有之二分猶二至也二分之祭古所必有然究疑無據及考朱氏家禮有引司馬温公語以孟詵家祭儀用二分日祭宗廟為有禮因欣然従之夫學士議禮雖非犯分然以無據之言而杜撰出之則三家叔孫通兼武斷矣予每論禮必不敢武斷類如此四時薦新日行獻禮古有薦新之禮與薦禮又别王制大夫士宗廟之祭有田則祭無田則薦薦不可兼祭而祭則可以兼薦故但舉薦禮則不問有田無田皆可以薦況薦新則尤薦中之最薄者如庶人春薦韭夏薦麥秋薦黍冬薦稻類而月令則又有薦鮪薦含桃國語有大寒薦名魚潛詩有季冬薦魚春薦鮪諸語則凡物新出皆可以薦故少儀云未嘗不薦新則汎指凡物言之且其輔薦之物不過數品如薦韭以卵薦麻以犬類是薦新最薄時時可行古又名獻可知也月今獻羔開氷豳風獻羔祭韭皆是祗四時無嘗月亦無嘗日以四方生物不齊如南方獻蔆芡北方獻棗栗各有時候則亦隨其時之所有者于以取獻無定日焉夏至行嵗薦之禮此家堂之薦也宗堂祧祖皆可薦而此則専薦三􅡕以始祖四親并不祧之祖一堂共享比之合食太祖與時祭犆祫之祫又復不同故不名時薦而名嵗薦此即三嵗一祫五嵗一禘之禮意也祗家禮合祭因不曉可薦尚疑非分且亦不知薦在何時苐引程伊川立春祭先祖一語以為立春是生物之始則杜撰矣按雜記孟獻子曰正月日至可以有事于上帝七月日至可以有事干祖所謂正月日至者即是冬至周之正月即夏十一月所謂七月日至者即是夏至周之七月即夏五月也則是夏至大祫可祭先祖自古有然或曰獻子此語本屬非禮故雜記非之則春秋僖八年亦七月禘此時獻子未生豈有先公非禮而獻子又言之獻子非禮之言而先公預行之者誤矣冬至日行嵗祭禮有燕或無祭而祗有薦者其燕亦同此宗堂之祭也禮緯有三年一祫五年一禘之文此是嵗祀皆合始祖四親及世室祧主而為祭者雖唐陸淳有大禘祗及始祖所自出而不及祧祖之説然在前儒則皆云大祫大禘總是合食而時祫則祗及四親大禘則遍及祧祖是嵗薦類祫祗薦家堂之四親嵗祭類禘當祭宗堂之祧祖甚為確當葢二至隂陽遞代時移事易報本追逺宜在此時即宋儒程氏亦且有冬至祭始祖之語則夏至嵗薦冬至嵗祭無可疑者特貴者得祭而賤者祗薦今但曰嵗祭而不及薦者以祭可兼薦薦不可兼祭苐言祭而薦在其中耳若嵗薦無燕嵗祭有燕一遇嵗祭則不問貴賤祭薦而皆當有燕其説見前或曰冬至有事于上帝何暇祭廟則天子重祭與諸侯以下無涉即有貴者當陪祀郊壇然官邸設祭未聞祭及祧祖者可勿慮也忌日行奠禮古無忌祭之文檀弓忌日不樂祭義忌日必哀皆祗謂父母死日必當哀戚並未著為祀典故周禮小史若有事則詔王之忌諱若惟恐忌日他祭則吉凶同日為未便即祭義文王之祭也事死如事生思死者如不欲生而下接以忌日必哀稱諱如見親亦指他宗廟之祭而祝及父母之稱諱當致哀痛非謂忌日有祭也但古禮散失原無備文終身之憂豈容獨闕今時俗士庶皆尚忌祭則因而行之未為無據雖其事當在喪禮之内無與吉事然終身行之則與祥禫之祭行于一時者稍别故著為嵗奠嵗嵗舉行其曰奠者以儀物稍殺祗比之喪禮之奠非殷祭也特古凡言忌皆指父母並無及祖曽者如曰終身之喪忌日之謂父母之喪忌日歸哭類今既行忌祭則祀先崇厚推及祖曽亦不為過但祗祀父母為合禮耳至于時俗忌祭并及生日名為生忌則古無此事且忌名不可居勿遵可也清明日霜降日行墓祭禮古原有墓祭韓詩曽子曰椎牛而祭墓不如雞犬逮親存也孟子卒之東郭墦間之祭者周禮春官冢人職有云凡祭墓為尸謂凡來祭墓必祀后土因以冢人作后土氏尸則周有墓祭明矣故漢制極重墓祭自髙帝以至宣帝皆于陵旁立廟曰寢園每日祭之漢志所謂日祭于寢者謂祭山陵之寢園也民間亦然如朱買臣傳其故妻夫婦上冢原涉𫝊涉上冢到車數十乗類此時去古未逺必有因承而後儒不察但見三禮未經記及便云古無墓祭則禮記所記有聘燕喪祭而無軍覲儀禮所記有士禮而無天子諸侯大夫之禮可謂古無軍覲禮并無天子諸侯大夫禮乎至若不學之徒妄求事始唐侍郎鄭正則祠享儀謂始于後漢光武諸將出征有經鄉里者詔有司給少牢掃墓聞見録謂始于曹公過橋𤣥墓致祭而性理載宋儒引周元陽祭録且謂始于唐開元二十年詔士庶于寒食日上墓拜掃則不惟不讀漢書且不讀孟子矣但清明上墓不知所始古二十四氣之名不顯于經惟倪寛正朔議有云黄帝建氣物分數氣者二十四氣也其中啟蟄霜降諸名雜見月令左傳夏小正諸書而不能全見獨漢志孝經緯始全載入一本之太初之歴是太初以前清明未顯焉得有清明上墓之事惟寒食上墓則六朝初唐早有之如李山甫沈佺期寒食詩皆有九原報親諸語全不始開元二十年之敇葢寒食上墓前此所有而開元則始著為令耳若清明則自六朝以迄唐末凡詩文所見並不及上墓一語沿及五代吴越王時羅隠有清明日曲江懐友詩始有二年隔絶黄泉下句至宋詩則直曰清明祭掃各紛然竟改寒食為清明矣按寒食節名見魏武令司馬彪續漢書及荆楚嵗時記與清明相隔一日一作二日相傳自冬至一百五日為寒食一百六日為清明元微之詩初過寒食一百六是也二節本相連而歴家祗取清明諸節編入歴中至寒食上已諸節皆不之及因之世但知清明而不知寒食遂漸漸以寒食上墓事歸之清明理固然也則是墓祭大禮三古所有而清明之期又復列代相因展轉有據家祭之外必當墓祭誰曰墓祭非古乎有謂墓祭始于曽子問宗子去他國庶子無廟孔子謂當望墓為璮以時祭此墓祭之始則尤不通夫望墓者謂廟在宗子之家庶子不得就宗子之家而致祭則所祭無主不知何人因望所祭之墓以代主此以家代廟以墓代主非謂墓不可到而姑先望之然後就之以漸而僥倖得一祭也夫墓者父母骨月之所歸也比之廟祀肸饗道求而未得者更親且更切也此亦何禁何限乃必不許到而姑望之而後就之至于如此先仲氏曰古死不出鄉周制合葬便省墓也後儒有覬覦利澤屢遷棺衣甚至瘞兩親他鄉而又分兩地必不令子姓得以展省推其故皆従古不墓祭四字强心藉口寃哉經不云乎入廟而思敬若不祭何以入也過墓而思哀若不祭何以過也左傳辛有適伊川見被髪而祭于野者以為當召戎禍此非以野祭為禍以被髮為禍也野祭即墓祭五代後周序寒食野祭而焚紙錢此何足召戎禍乎俗以十月朔舉秋祭亦無所考唐後秋節上山陵俱在秋仲今時祭在二仲則墓祭當在二季況春季在清明日則秋季當在霜降日祭義秋霜露既降此實造緯書者霜降之名之所始則因其名以為祭更屬脗合然此與忌奠正謁朔謁月獻等皆貴與賤所共行者其主祭之法與時祭同辨定祭禮通俗譜卷二
