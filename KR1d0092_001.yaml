body:
  text: 辨定祭禮通俗譜卷一翰林院檢討毛竒齡撰古禮不傳久矣曲臺十七篇祗得士禮而李氏所上周官經則専記周代官政而不切民用若戴馬禮記率戰國以後學徒所録零論襞屑並無一通全之禮可為世法而漢宋羣儒則又各起而聚訟其間于是古禮亡即俗禮亦沫沫焉幼時與仲氏學禮傷時俗蠱壊思一補救而無可考證不得已取朱氏家禮一書為之胚模而其書鮮據不惟古禮不甚合即時俗有未便行者㑹崇禎之末東江被兵與仲氏分竄者久暨鼎定未幾子復以避人故流離走四方學既荒落而壯齒又復磨滅胸腹無所記即有記途路無書難用為引斷因思禮制煩賾或得先取二重禮所云民食喪祭者畧為之考辨以存初志而中間被召留京師十年暨歸田而仲氏已亡予亦老不親學矣大司成汪霦予同年同館廬墓湖濱與其子曰講三禮予敬而就之新安姚際恒著禮記釋滯論時作主客而仁和學師氏唐彪毎以祠堂禮下詢因慨然于心仍取朱氏家禮并各族祠堂禮酌啐而條理之先輯為祭禮通俗譜以備參考若夫二重之未具則仲季論喪尚餘雜録世多學人豈無起而踵成之者予重有待焉一祭所凡家屋有前堂俗名前㕔後室俗名内堂兩重者以後室東一間凡屋不能皆南向其曰東西南北者祗左右前後也後倣此藏先世神主于其中名曰家堂即無兩重者祗以前堂棟北架柱間凡屋五架七架不同以向後二架為度立壁以分其半而藏神主于後半之西壁東向置一庪閣以安之庪閣即庋閣接木為庪其名同前古禮最重者貴貴故祭先之禮惟貴者始得立廟如王制祭法所云天子七廟諸侯五大夫三適士二士官師一庶人祭父于寝其多寡等殺皆以爵位為升降此惟三代封建之世世爵世官得以行之今則貴不長貴賤不長賤父賤而子貴則子立廟子貴而孫賤則孫又毁廟即一人而朝進其官則朝立廟夕褫其爵則夕又毁廟若世官褫爵則其子替之矣如酖叔牙而立其後類不轉瞬間而驟立驟毁豈可為制是以漢唐以來俱無建廟之文即南渡紹興嘉泰諸年每為秦太師韓平原郡王屢請立廟而制終未定于是朱文公熹創為家禮一書間取文潞公司馬温公祠堂之制以為祭典謂廟不可得則姑以祠堂代之而不知祠堂似廟而實非廟廟祗一主而祠堂無限主廟必有名如祖廟禰廟類而祠堂無可名其中所祭之主與主祭之人俱周章無理即揆之于今凖之于古而百不一當説見後然且聚族祭賽事近蠻俗而究其實則仍與帝王祫禘之禮顯相僭越祫禮合親廟及祧廟之主皆升食祖廟漢儒説禘禮亦然況廟尊祖貎説文尊先祖貎也以堂宇得名爾雅有東西廂曰廟無者曰寢曰室而祠則祭之别稱祠祭也又説文春祭曰祠史凡立祠建祠毁其祠皆謂建祭與廢祭非謂創其廟毁其廟也即後漸誤祠作廟亦未嘗祠廟溷稱如立諸葛祠而祭其廟類諸葛亮亡向充謂宜立祠于沔陽欲祭者皆限至廟以㫁私祠豈可以祠之一字作廟屋稱乎古廟在家屋之内曲禮曰君子將營宫室宗廟為先以廟在宅居左也故檀弓曰喪不慮居以廟在居前若因喪慮居而賣其宅將必并廟而賣之故不慮則廟在屋内明矣但廟制二層前堂後室室即寝也月令註凡廟前曰廟後曰寝寝即室之别名如王宫曰小寝後室為内寝類家屋亦然前堂後室今既不立廟則即借所居之室而分為廟室以藏主其中且以當庶人祭寝之寝其必在東一間者周禮建國神位左宗廟右社稷考工記匠人營國左祖右社而漢書直曰宗廟居陽示不忍死親之義則明在東矣乃不學之人謂神道尚右當在西首且引漢後唐初廟制漢廟制同堂異室以西為首唐貞觀間許敬宗所奏廟制亦同與宋人祠堂式為據司馬公文潞公祠堂式皆神主並列以西為首不幾與先王左祖之義相乖反乎若神座考妣考西妣東則禮坐尚右如燕坐布席以西為上禮坐饗賓以西為尊類不必神道尚右始然也若神道尚右則仍死親矣豈禮意乎或者所居庳陿有堂無室則割堂之半後為寢廟制前楹為庭後壁為寢先仲氏曰廟庭如今之前軒廟寢如今之後軒類但庭亦有名寢者如檀弓註兩楹之間名路寢類惟廟寢之寢則多指廟後之室與廟半之後言漢傅昭儀傳註所云廟之前曰殿半以後曰寢是也其曰西壁東向者古者堂室之制無不南向廟制皆然廟所以象王之有朝故王于廟祭賜卿王南面卿北面受之今曰廟有東向者無學之言也但堂室庭楹雖俱南向而室之為制則南設一牖而啟户于東南之一隅従户入室則轉身向西以西為室盡至尊之地藏主于此西壁穴為石室藏主故曰宗祏而夾于西南之奥與西北屋漏之間此其勢不得不東向是其所謂東向者主也非室也今前堂後室則屋皆南向故主在東間而仍南向若在半寢則中當通門勢不得不如藏主之室而西負東向此凖之古酌之今而兩相合者其曰庪閣者亦以寢陿便安置也此皆自然之禮也凡祭祗在室遇有貴者則迎主而祭于前堂否則仍返祭在室其為半室亦如之禮大夫士祭于廟庶人祭于寢今既無廟制則當依古禮以堂後之室為寢使庶人祭于此已不為僭儻或驟貴則仍可依立廟之制祭于前堂葢卿士已上之祭原兼堂室藏主設主皆在室而迎祭于堂所謂室事交室堂事交堂者儻其後不繼貴則仍可返而祭之于室是不需立廟亦不需毁廟㝠然無形跡之可間而且前不悖古後不戾今人人可行户户可倣此良法也即半室之寢士大夫庶人皆可藏主而庶人則専祭于此貴者則兼祭在堂其與前堂後室之禮無一不同儻或貴有贏財另辟後室夫誰禁之凡祭謂凡人之祭指庶人言若祭法則有専在室者如虞于室類小記虞杖不入室士虞曰虞于寢寢即室也有兼堂室者如詔祝于室坐尸于堂類此郊特牲文若禮器又有納牲詔于庭血毛詔于室羮定詔于堂類但古祭貴周遍自室至門大祭必周今迎尸繹祊俱無其事則祗在堂行禮而迎室主以就之亦勢為之也少儀凡祭于室中鄭註天子諸侯有坐尸于堂之禮卿大夫以下無之正祭饋食並在室中此云迎主而祭于堂非僭也以為卿大夫適士俱當祭廟惟庶人祭寢此以堂當廟故在堂況諸侯有祭堂之禮儻爵尊則儗之諸侯庸為僭乎若在通族之長支則另辟前堂之左三間藏逺祖之神位于其中若所居庳陿則祗辟一間臨祭則迎位而祭于前堂以通族多人慮不容也若又不足則通族助成之通祭之以為合宗之禮名曰宗堂若舊有祠堂者則就其堂以行事其名同前但名宗堂或仍名祠堂今俗名宗祠非是說見前前専祭之所此則通祭所也古天子諸侯之弟另立一宗主祭祀燕饗以為合宗收族之法所謂宗子也今其制已不可行而且以長支代宗子其名與實俱不通則但仿其禮意而仍以長支稱之使其家立通祭所而祭逺祖于其中逺祖者謂髙祖以上之祖祭法所謂逺廟程伊川所謂始祖與先祖俱是也祠堂本俗製其祭法亦甚乖舛而以之收族則未嘗不可用者位與主有别説俱見後二所祭者乃設父祖曽三主為三宔音與主同而藏以三匰音簞曰考室曰祖考室曰曽祖考室復設髙祖牌藏一匰曰髙祖考室始祖牌一匰曰始祖考室復設本房先世之賢者貴者有功者為不祧祖牌合一匰曰世室即不祧祖每室設考妣二宔而祔妾妣傍其易為牌亦如之卑幼散祔古所祭有等殺天子七廟自始祖外祭父祖曽髙四親并髙祖之父髙祖之祖七世而止所謂七世之廟也漢韋鄭二家皆謂止四親廟非是見予廟制折𠂻卷内諸侯五廟自始祖外祭及髙祖而止所謂五世之廟也大夫三廟無始祖祭及曽祖而止適士二廟及祖而止官師一廟與庶人止祭其父則士庶祭祖已為非分況可自始祖以下父祖以上同堂饗祀以自取罪戾乎但追逺孝先不嫌過厚宋程氏伊川原有士庶一祭亦不害上及髙祖之説而明儒湛若水釋祭法謂大夫三廟則髙曽可同一廟適士二廟則髙曽祖可同一廟庶人祭寢則四親可共一寢雖其説不經而意亦甚善嘗考追王之典止及三世詩書毎祭皆稱曽孫如詩曽孫燕喜書惟有道曽孫周王發類則四親並祭特重三親況明初禮官用行唐縣知縣胡秉中議許庶人祭及三代今俗祭祝詞尚有稱三代尊親者則既遵古禮又奉王制限祭三代甚為允當于是先立三代神主以為士庶之祭所自始然而祭不可限萬一遇有貴者當祀四親則方其貴時須増設髙祖一主及其賤而又毁之與前所云建廟毁廟同一非制且始祖之祭在大夫已無之王制大夫三廟一昭一穆與太祖之廟而三此言别子為大夫者見註疏及予廟制折衷若等為大夫則祭法祗以父祖曽當三廟之數而不及太祖何況士庶然而木本水源貴在返始故家國建祭皆特重始封之君與始官之人而小記别子為祖在孔疏原有異地來此便為始祖之説則凡家之逺祖有官閥開基與始來遷此地者當立為始祖一祭況今時出仕上自三公下及監司反有貴于諸侯及大夫者則孝先崇厚在始祖一祭不為非分但竟設一主則庶人嫌于侵貴而不為設位則立主毁主仍復多事因并設髙祖一牌始祖一牌各藏諸一室使備薦禮而後待貴者祭之説見後謂為四親而實非四親謂為五廟而實非五廟謂為三代而實不止三代在下不偪在上不僭此真酌古凖今審經㑹禮之至善者也至于不祧則家國一理天子以下俱宜有之其云賢者即忠孝節義之人以徳祀者也有功者功于家若功于國即在忠義一類矣以功祀者也貴者以貴祀古祭重貴貴者得祀貴者得奉祀三代世爵世官與漢後閥閲氏族皆是也然此祗本房者也祭法稱父為考祖為王考曽為皇考髙為顯考始祖為祖考其稱名有定數矣乃朱氏家禮稱父為考祖為祖考曽髙祖為曽髙祖考而皆加皇字于其上此本曲禮皇考與儀禮皇祖皇尸之文而誤用之者諸禮所記本天子諸侯通稱故唐僖宗朝曽禁稱皇字而易以顯字即家禮所稱明儒楊慎亦復以顯字易之夫皇與朕在周時不禁而秦後禁之則禁之矣今敢有朕已者乎若祭法以皇屬曽以顯屬髙則又與他經皇考皇祖之稱不合且顯義亦未安康誥惟乃丕顯考文王顯與考不屬如孟子丕顯哉文王謨類今世所稱考祖考曽祖考髙祖考始祖考而上無加字在主與牌與祝則概以先字冠之此據周禮舞大武以享先祖舞大濩以享先妣類較最確當者至于世室之稱則本春秋世室屋壊及明堂位文世室武世室之文皆指諸侯不祧者言自宋儒少學誤以文武世室為文王武王之廟遂以此為天子之制非也文世室伯禽武世室魯武公也主者神主也宔者主之函也一作説文云藏主之器是也若朱氏禮作櫝則藏龜玉器褻尊甚矣牌者揭也以木為牓而揭其稱也許慎五經異義謂大夫已毁主則結帛士則結茅今以木為之耐久也主有宔而牌無宔所製有隆殺也近親用主逺祖用牌者近者隆逺者殺也髙祖在四親之近而亦殺之不敢祀四親也若室者則又藏宔與牌之外匱其製稍髙廣如屋平頂而前有槅門古本名匰周禮司巫祭祀共匰主説文云宗廟盛器是也今朱氏禮不知何據又妄名為龕按説文龕龍貎博雅鋡龕受盛也字書龕與勘同引楊子劉龕西陽為証至宋作廣韻始有塔下室之註而毛晃増韻謂之為浮圖之室則龕非室名即名室亦佛氏為之而可以之名祖堂乎唐蘇頲有利州北佛龕詩則其名不始廣韻但字註始此耳每室設考妣二主男西女東説見前若有妾者則祔妾主于妣傍即改主為牌亦設考妣而使妾祔之所謂與主同也其又曰卑幼散祔者則謂主祭者之妻妾及子姪或先身而亡但散祔室外以俟主祭者亡後分别祧祔有子者入之親堂殤無後者祔于祧室見後各有安置若喪服小記云妻妾先亡則祔之祖姑祖妾之傍所謂中一以祔中一間一位也孫祔祖曽祔父者然説多難通如欲祔妾者當祔祖妾傍儻祖無妾則又中一而祔于髙祖妾傍髙祖又無妾則無所中一矣乃又曰可返而祔于考妣之傍依囘如此是何如散祔室外之為當乎若子姪之祔當祔祖室兄弟之祔當祔曽室萬一有子姪之子當祔主祭者一輩之室而身見主祭祖父並未亡也如之何則散祔室外最為確當餘説見前髙祖易主為牌則主埋墓間或焚之凡易牌易博牌見後皆同或曰焚非古禮則古凡立學祭先聖先師有以暫設主而焚去者即結帛結茅亦然若埋主墓間與漢制埋陵園意同必依何休註埋兩階間保無失足致踐踏乎凡分祭之家即三親亦設牌以無二主也乃設神􅡕于家堂北壁三分之而裕其中言中一分廣也中􅡕安始祖考室近西北隅負壁南向安世室于西南隅亦南向安髙祖考室于東北隅倚壁西向安祖考室于東􅡕之東南隅亦西向安曽祖考室于西􅡕之西北隅倚壁東向安考室于西南隅亦東向各屏以朱版而題之曰祏祏前共設神案一不設座其在庪閣亦如之此安置禮也廣韻棲謂之牀神牀者神所棲也本作􅡕言隠藏也賈公彦作覲禮註謂廟皆並列而並南向今神􅡕並列而室皆異向尊卑不偶坐也禮堂尊西北始祖居之説見前示尊也且以避廟主之居中位也宋人祠堂式恐侵廟制有虚其中者迤南為世室次于尊也與始祖同向類始祖也始祖世室俱不祧廟式皆南向主皆東向説見前而髙祖以下或西向或東向重昭穆也髙祖本四親而位中􅡕不敢祀四親也髙祖始祖同薄壁祖以背負壁髙以右倚壁而不嫌于偪異向也且得與曽祖為昭穆也髙中牀向西為昭曽西牀向東為穆東西安四親而東闕一者所以待髙祖也曰貴則祀髙祖耳葢合觀為四親而分觀之祗得為三代也東西兩牀祗三室其蔽以版者曰此祏製也古以石藏主曰祏今木之説見後葢以室為匰藏匰者則為祏也其各為屏者向使祭三代乎則苐啟左右而蔽其中若不為相聞者也使合祭乎則齊啟其屏畧無間然此真經營安置委曲斟酌之盡善者庪閣雖卑陿而中分為三而蔽以屏亦猶是也不設座未出主也且以杜夫人之或坐之也左傳典司宗祏杜預云祏者宗廟藏主石室也葢古藏主于廟室穴西壁為塪而蔽之以石故左傳又云反宗祏于西圃而徐註説文謂以石為藏主之室是也晉唐以後别名為坎今以木為􅡕而亦名祏者以坎與􅡕則皆有塪祏義耳或疑匰盛主器不必是室賈公彦註謂以匰盛主來祭所太祝取主而退匰似偶然盛主升廟之物非也漢杜子春曰匰盛主器名而晉摯虞謂藏主有石函函内有笥以盛主曰匰則匰者複函也宔祗藏一主而匰則合祖妣而並藏之祏則又合諸匰而統藏之雖俱名藏室而多寡不同始祖與不祧之祖俱南面似乎無據按祫祭迎尸出堂之時后稷與文武二尸俱南向餘尸俱昭穆東西向夫后稷始祖也文武不祧祖也后稷文武俱南向則始祖與不祧主其俱宜南向明矣若夫文武二廟韋鄭以為在七廟之内夫七廟昭穆東西向者也曽文武南向而猶在七廟中乎予作廟制折𠂻成未及此節因并誌之若夫宗堂三間則中一間為神􅡕者三一如家堂之為制而苐合通族之不祧者為世室至于左右二間則皆東西相向為夾室毎向各五室共十室自始祖以下髙祖以上凡所祧祖俱入之而易牌而為博牌毎一世為一室一室共一牌次第書此一世祖名于博牌之間毎名合祖妣而直書之自北而南名曰祧室凡十室以次遷毁外各屏以版與中堂同至通族無後者各依世並列祧室殤則祔末室以次遷毁祠堂如之堂一間亦如之長房雖領宗而其祭三代薦始祖則猶之諸房也故三􅡕並列與家堂同而獨不祧一室則合諸房之不祧者而共藏其中所以備夫貴子孫合祭之禮而長房之不祧者則已祔其中焉特四親遞祧當立祧廟曽子問所稱遷廟者各為主而藏其中至大祫則合而祭之公羊所謂升合食于太祖者今士庶之祭皆所不及然祭法去壇為鬼而鄭氏説禮以為凡鬼不可祭而皆可以薦即賈公彦註亦謂大夫之鬼薦于祖壇官師之鬼薦于父廟是古凡祧主已去壇墠者皆可私薦故程伊川有冬至祭始祖立春祭先祖之説所謂先祖者正指髙祖以上始祖以下之祧祖也今合宗收族飲食燕饗逮及生人而每嵗一薦尚不能遍及先祖夫豈人情因于宗堂兩傍各設為祧主之室東西列焉古廟東西廂名為夾室而今則以堂左右當之東昭西向西穆東向尚存廟意而苐藏祧室于堂旁則又與廟别曰不敢廟也一世為一室辨等也合一牌祛煩重也祖妣直書者慮賾且慮其相溷也自北而南従上以至下也限十世祭有盡也曰十世則亦可以毁矣世以十為逺如論語子張問十世可知史猶當十世宥皆指至逺可驗否則族大者慮不容也古殤無後者則祭于宗子之室今祔宗堂者則猶之祔宗室也無後者依世並列凖祧室世次而祔以等也殤十五至十九為長十二至十五為中八嵗至十一為下其祔末室者祔祧主之末一室也其遷去以次者下殤終父母之身中殤終兄弟之身長殤終兄弟之子之身也此所祭之數也古祔無後者皆間一以祔如伯叔父無後必祔曽祖伯叔祖父無後必祔髙祖然萬一有伯叔曽祖父于此而無後則四親已絶無所祔矣故依世並列十世則毁此至當不易之禮餘説見前辨定祭禮通俗譜卷一
