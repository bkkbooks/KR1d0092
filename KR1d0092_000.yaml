body:
  text: 辨定祭禮通俗譜禮類六雜禮書之屬提要臣等謹按辨定祭禮通俗譜五卷國朝毛竒齡撰竒齡有仲氏易已著録是編一名二重禮譜盖欲成喪祭二禮嗣以喪禮别有吾說編因惟存祭禮其說取古禮而酌以今制故以通俗為名凡分七門一曰祭所二曰所祭者三曰主祭之人四曰祭之時五曰祭儀六曰祭器七曰祭物末附外神其中各條雖間與朱子家禮為難不出竒齡平日囂爭之習然考朱子年譜家禮成於乾道六年庚寅朱子時四十一歳其稿旋為人竊去越三十年朱子沒後始復有傳本行世儒者或以為疑黄榦為朱子弟子之冠亦云為未暇更定之本則家禮之出自朱子手定與否尚無顯証即真獲朱子已失之稿而草創初成亦恐尚非定本以王懋竑之篤信朱子而所作白田雜記乃反覆辨是書之依托其言具有根據則竒齡之辨又不能盡以好勝目之矣其間如謂漢唐以來人臣無建廟之文南渡紹興嘉㤗諸年為秦檜韓侂胄立廟而制終未定考宋龔鼎臣東原録稱文彦博家廟不作七間乃用唐杜岐公家舊式則安得謂漢以後無建廟之文其論後世不世爵世官今之宗子非古宗子引阡陌不同於井田郡縣不同於封建為証其說是也然井田廢而正供之義不廢封建廢而臂指相維之義不廢世官廢而宗子支子之義不廢漢書載當時詔令毎稱賜天下為父後者其時已不世官而云為父後則有不為父後者可知今制父母在而子先卒者其長孫於祖父母之喪服斬衰三年即宗子為後之義灼然可推安能一舉而廢之使主祭之時但以行輩年齒為序乎至於祭必以子一條謂祠堂合祭先代使宗子主四親之祭致凡為人子者不得祭父則所祭四親係他人之親並非已親所祭之父係他人之父並非己父措語尤乖皆不免於瑕纇葢其大意務通人情故不免有違古義然大致斟酌變通於古禮之必不可行及俗禮之誤托於古者剖析考証亦徃徃釐然有當固不妨存備一家之說也乾隆四十二年六月㳟校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
